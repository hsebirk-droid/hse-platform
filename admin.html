<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Painel Administrativo</h1>
  <button onclick="window.location.href='dashboard.html'">Voltar</button>
</header>

<div class="container">

  <div class="card">
    <h2>Carregar formação (PDF ou PowerPoint)</h2>

    <input type="file" id="fileUpload" accept=".pdf,.ppt,.pptx">
    <br><br>

    <button onclick="upload()">Carregar ficheiro</button>
  </div>

  <div class="card">
    <h2>Visualização dentro da plataforma</h2>
    <iframe id="viewer"></iframe>
  </div>

</div>

<script type="module">

import { uploadFile } from "./firebase.js";

async function upload(){

  const file = document.getElementById("fileUpload").files[0];

  if(!file){
    alert("Escolhe um ficheiro primeiro");
    return;
  }

  const url = await uploadFile(file);

  document.getElementById("viewer").src = url;

  localStorage.setItem("formacaoURL", url);
}

window.upload = upload;

</script>

</body>
</html>
