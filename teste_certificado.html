<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Certificado</title>
<style>
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F7F5F0;
    padding: 40px;
  }
  .cert-container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .preview {
    background-image: url('https://hsebirk-droid.github.io/hse-platform/imagens/fundo_certificado.png');
    background-size: cover;
    background-position: center;
    min-height: 500px;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
  }
  .texto-nome {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 900;
    color: #00338D;
  }
  .texto-concluiu {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
    font-size: 1rem;
    color: #616365;
  }
  .texto-formacao {
    position: absolute;
    top: 62%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 80%;
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #C5A059;
  }
  .nota {
    position: absolute;
    bottom: 12%;
    left: 12%;
    text-align: center;
  }
  .data {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
  .id {
    position: absolute;
    bottom: 12%;
    right: 12%;
    text-align: center;
  }
  .label {
    font-size: 0.7rem;
    color: #616365;
  }
  .valor {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #00338D;
  }
  .info {
    margin-top: 20px;
    padding: 12px;
    background: #f0f0f0;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="cert-container">
  <h2>🎓 Teste do Certificado</h2>
  <p>Se a imagem abaixo aparecer, o certificado está funcionando!</p>
  
  <div class="preview">
    <div class="texto-nome">João Silva</div>
    <div class="texto-concluiu">concluiu com sucesso a formação</div>
    <div class="texto-formacao">Formação Exemplo</div>
    <div class="nota">
      <div class="label">NOTA FINAL</div>
      <div class="valor">85%</div>
    </div>
    <div class="data">
      <div class="label">DATA</div>
      <div class="valor">27/03/2026</div>
    </div>
    <div class="id">
      <div class="label">CERTIFICADO ID</div>
      <div class="valor">CERT-2026-1234</div>
    </div>
  </div>
  
  <div class="info">
    🔍 <strong>Link da imagem:</strong> https://hsebirk-droid.github.io/hse-platform/imagens/fundo_certificado.png
  </div>
</div>
</body>
</html>
