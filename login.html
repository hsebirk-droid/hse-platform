<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birkenstock S&CC Portugal — Plataforma de Formação</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --birkenstock-blue: #00338D;
  --birkenstock-blue-dark: #00277A;
  --birkenstock-gold: #C5A059;
  --birkenstock-gray: #616365;
  --birkenstock-beige: #F7F5F0;
  --bg: #F4F7F9;
  --border: #D7DEED;
  --white: #fff;
  --danger: #dc2626;
  --danger-bg: #fee2e2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--birkenstock-beige);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  background: var(--birkenstock-blue);
  padding: 12px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--birkenstock-gold);
  flex-wrap: wrap;
  gap: 16px;
}
.topbar .logo-text {
  font-weight: 700;
  font-size: 1.2rem;
  color: white;
  line-height: 1.2;
}
.topbar .logo-text small {
  font-size: 0.7rem;
  font-weight: 400;
  display: block;
  color: rgba(255,255,255,0.7);
}
.topbar span {
  color: rgba(255,255,255,.5);
  font-size: 12px;
  letter-spacing: .06em;
}

.wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.card {
  background: var(--white);
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,51,141,.1);
}
.card-top {
  background: var(--birkenstock-blue);
  padding: 36px 40px;
  text-align: center;
}
.card-top .logo-large {
  font-weight: 800;
  font-size: 1.8rem;
  letter-spacing: 2px;
  color: white;
}
.card-top .logo-large small {
  font-size: 0.9rem;
  font-weight: 500;
  display: block;
  margin-top: 4px;
  color: rgba(255,255,255,0.8);
}
.card-body {
  padding: 36px 40px;
}
.card-body h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--birkenstock-blue);
  margin-bottom: 24px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--birkenstock-gray);
  transition: all .15s;
}
.tab.active {
  background: var(--white);
  color: var(--birkenstock-blue);
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

.fg { margin-bottom: 16px; }
.fg label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--birkenstock-blue);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.fg input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  color: #1a1a1a;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}
.fg input:focus { border-color: var(--birkenstock-blue); }

.errmsg {
  background: var(--danger-bg);
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--danger);
  margin-bottom: 14px;
  display: none;
}

.btnlogin {
  width: 100%;
  background: var(--birkenstock-blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: .08em;
  transition: all .2s;
  margin-top: 4px;
}
.btnlogin:hover { background: var(--birkenstock-blue-dark); }

.footer {
  padding: 20px 40px;
  text-align: center;
  font-size: 11px;
  color: var(--birkenstock-gray);
  border-top: 1px solid var(--border);
}

.password-hint {
  font-size: 10px;
  color: var(--birkenstock-gray);
  margin-top: 12px;
  text-align: center;
  display: flex;
  justify-content: space-between;
  gap: 16px;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-text">
    BIRKENSTOCK
    <small>S&CC Portugal · Formação</small>
  </div>
  <span>Plataforma de Formação</span>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-top">
      <div class="logo-large">
        BIRKENSTOCK
        <small>S&CC Portugal</small>
      </div>
    </div>
    <div class="card-body">
      <h2>Portal de Formação</h2>
      
      <div class="tabs">
        <button class="tab active" id="tab-colab">👥 Colaborador</button>
        <button class="tab" id="tab-admin">👑 Administrador</button>
      </div>
      
      <div id="errmsg" class="errmsg"></div>
      
      <div id="form-colab">
        <div class="fg">
          <label>Utilizador</label>
          <input type="text" id="c-user" placeholder="nome.apelido">
        </div>
        <div class="fg">
          <label>Palavra-passe</label>
          <input type="password" id="c-pass" placeholder="••••••••">
        </div>
        <button class="btnlogin" id="btn-colab">Entrar</button>
      </div>
      
      <div id="form-admin" style="display:none">
        <div class="fg">
          <label>Utilizador</label>
          <input type="text" id="a-user" placeholder="admin" value="admin" readonly style="background:#f0f0f0">
        </div>
        <div class="fg">
          <label>Palavra-passe</label>
          <input type="password" id="a-pass" placeholder="••••••••">
        </div>
        <button class="btnlogin" id="btn-admin">Entrar como Gestor</button>
      </div>
      
      <div class="password-hint">
        <span>🔐 Acesso administrador</span>
        <span>❓ Dúvidas? Fale com RH</span>
      </div>
    </div>
    <div class="footer">
      &copy; 2026 Birkenstock S&CC Portugal · Plataforma de Formação
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwywvboQgWqkrZlbwrUPdaUq-gLnWM64E",
    authDomain: "plataforma-ssa-3130e.firebaseapp.com",
    projectId: "plataforma-ssa-3130e",
    storageBucket: "plataforma-ssa-3130e.firebasestorage.app",
    messagingSenderId: "850671249674",
    appId: "1:850671249674:web:53a115408f8006745c32f3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.db = db;
  window.auth = auth;
  window.collection = collection;
  window.getDocs = getDocs;
  window.query = query;
  window.where = where;
</script>

<script>
  let isLoggingIn = false;
  
  function showErr(msg) {
    const err = document.getElementById('errmsg');
    err.textContent = msg;
    err.style.display = 'block';
    setTimeout(() => { err.style.display = 'none'; }, 4000);
  }
  
  function hideErr() { 
    document.getElementById('errmsg').style.display = 'none'; 
  }
  
  async function validarLoginColaborador() {
    if(isLoggingIn) return;
    
    const user = document.getElementById('c-user').value.toLowerCase().trim();
    const pass = document.getElementById('c-pass').value;
    
    if(!user || !pass) { 
      showErr('Preencha utilizador e palavra-passe.'); 
      return; 
    }
    
    isLoggingIn = true;
    document.getElementById('btn-colab').disabled = true;
    document.getElementById('btn-colab').textContent = 'A validar...';
    
    try {
      const q = window.query(window.collection(window.db, 'colaboradores'), window.where('user', '==', user));
      const querySnapshot = await window.getDocs(q);
      
      let found = false;
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        if(data.pass === pass) {
          found = true;
          localStorage.setItem('usuarioAtivo', user);
          window.location.href = 'dashboard.html';
        }
      });
      
      if(!found) {
        showErr('Utilizador ou palavra-passe incorretos.');
        document.getElementById('c-pass').value = '';
        isLoggingIn = false;
        document.getElementById('btn-colab').disabled = false;
        document.getElementById('btn-colab').textContent = 'Entrar';
      }
    } catch(error) {
      console.error('Erro no login:', error);
      showErr('Erro ao conectar à base de dados.');
      isLoggingIn = false;
      document.getElementById('btn-colab').disabled = false;
      document.getElementById('btn-colab').textContent = 'Entrar';
    }
  }
  
  function validarLoginAdmin() {
    if(isLoggingIn) return;
    
    const pass = document.getElementById('a-pass').value;
    
    if(!pass) { 
      showErr('Preencha a palavra-passe.'); 
      return; 
    }
    
    const ADMIN_PASS = 'SSA2024admin';
    
    if(pass === ADMIN_PASS) {
      localStorage.setItem('usuarioAdmin', 'admin');
      window.location.href = 'admin.html';
    } else {
      showErr('Palavra-passe incorreta.');
      document.getElementById('a-pass').value = '';
    }
  }
  
  function switchToColab() {
    document.getElementById('tab-colab').classList.add('active');
    document.getElementById('tab-admin').classList.remove('active');
    document.getElementById('form-colab').style.display = 'block';
    document.getElementById('form-admin').style.display = 'none';
    hideErr();
  }
  
  function switchToAdmin() {
    document.getElementById('tab-admin').classList.add('active');
    document.getElementById('tab-colab').classList.remove('active');
    document.getElementById('form-admin').style.display = 'block';
    document.getElementById('form-colab').style.display = 'none';
    hideErr();
  }
  
  document.getElementById('btn-colab').addEventListener('click', validarLoginColaborador);
  document.getElementById('btn-admin').addEventListener('click', validarLoginAdmin);
  document.getElementById('tab-colab').addEventListener('click', switchToColab);
  document.getElementById('tab-admin').addEventListener('click', switchToAdmin);
  
  document.getElementById('c-pass').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') validarLoginColaborador();
  });
  document.getElementById('a-pass').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') validarLoginAdmin();
  });
</script>
</body>
</html>
