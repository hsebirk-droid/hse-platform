<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birkenstock S&CC Portugal — Plataforma de Formação</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="topbar">
  <div class="logo-text">
    BIRKENSTOCK
    <small>S&CC Portugal · Formação</small>
  </div>
  <span>Plataforma de Formação</span>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-top">
      <div class="logo-large">
        BIRKENSTOCK
        <small>S&CC Portugal</small>
      </div>
    </div>
    <div class="card-body">
      <h2>Portal de Formação</h2>
      
      <div class="tabs">
        <button class="tab active" id="tab-colab">👥 Colaborador</button>
        <button class="tab" id="tab-admin">👑 Administrador</button>
      </div>
      
      <div id="errmsg" class="errmsg"></div>
      
      <div id="form-colab">
        <div class="fg">
          <label>Utilizador</label>
          <input type="text" id="c-user" placeholder="nome.apelido" autocomplete="username">
        </div>
        <div class="fg">
          <label>Palavra-passe</label>
          <input type="password" id="c-pass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btnlogin" id="btn-colab">Entrar</button>
      </div>
      
      <div id="form-admin" style="display:none">
        <div class="fg">
          <label>Utilizador</label>
          <input type="text" id="a-user" placeholder="admin" value="admin" readonly style="background:#f0f0f0">
        </div>
        <div class="fg">
          <label>Palavra-passe</label>
          <input type="password" id="a-pass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btnlogin" id="btn-admin">Entrar como Gestor</button>
      </div>
      
      <div class="password-hint">
        <span>🔐 Acesso administrador</span>
        <span>❓ Dúvidas? Fale com RH</span>
      </div>
    </div>
    <div class="footer">
      &copy; 2026 Birkenstock S&CC Portugal · Plataforma de Formação
    </div>
  </div>
</div>

<!-- Toast notification (será criado dinamicamente pelo JS se necessário) -->
<div id="toast" class="toast"></div>

<script type="module">
  import { loginColaborador, loginAdmin, getCurrentUser } from './js/auth.js';
  import { showToast } from './js/utils.js';

  // ============================================
  // ELEMENTOS DOM
  // ============================================
  const errMsgDiv = document.getElementById('errmsg');
  const formColab = document.getElementById('form-colab');
  const formAdmin = document.getElementById('form-admin');
  const tabColab = document.getElementById('tab-colab');
  const tabAdmin = document.getElementById('tab-admin');
  const btnColab = document.getElementById('btn-colab');
  const btnAdmin = document.getElementById('btn-admin');
  const inputUser = document.getElementById('c-user');
  const inputPassColab = document.getElementById('c-pass');
  const inputPassAdmin = document.getElementById('a-pass');

  let isLoggingIn = false;

  // ============================================
  // FUNÇÕES DE UI
  // ============================================
  
  function showError(message) {
    errMsgDiv.textContent = message;
    errMsgDiv.style.display = 'block';
    setTimeout(() => {
      errMsgDiv.style.display = 'none';
    }, 4000);
  }

  function hideError() {
    errMsgDiv.style.display = 'none';
  }

  function setLoading(button, isLoading, originalText = 'Entrar') {
    if (isLoading) {
      button.disabled = true;
      button.textContent = 'A validar...';
    } else {
      button.disabled = false;
      button.textContent = originalText;
    }
  }

  // ============================================
  // HANDLERS DE LOGIN
  // ============================================
  
  async function handleLoginColaborador() {
    if (isLoggingIn) return;
    
    const user = inputUser.value.trim();
    const pass = inputPassColab.value;
    
    if (!user || !pass) {
      showError('Preencha utilizador e palavra-passe.');
      return;
    }
    
    isLoggingIn = true;
    setLoading(btnColab, true);
    
    try {
      const success = await loginColaborador(user, pass);
      
      if (success) {
        showToast('✅ Login efetuado com sucesso!');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 500);
      } else {
        showError('Utilizador ou palavra-passe incorretos.');
        inputPassColab.value = '';
        setLoading(btnColab, false);
        isLoggingIn = false;
      }
    } catch (error) {
      console.error('Erro no login:', error);
      showError('Erro ao conectar à base de dados. Tente novamente.');
      setLoading(btnColab, false);
      isLoggingIn = false;
    }
  }

  function handleLoginAdmin() {
    if (isLoggingIn) return;
    
    const pass = inputPassAdmin.value;
    
    if (!pass) {
      showError('Preencha a palavra-passe.');
      return;
    }
    
    isLoggingIn = true;
    setLoading(btnAdmin, true, 'Entrar como Gestor');
    
    // Pequeno delay para feedback visual
    setTimeout(() => {
      if (loginAdmin(pass)) {
        showToast('✅ Acesso administrativo concedido!');
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 500);
      } else {
        showError('Palavra-passe incorreta.');
        inputPassAdmin.value = '';
        setLoading(btnAdmin, false, 'Entrar como Gestor');
        isLoggingIn = false;
      }
    }, 300);
  }

  // ============================================
  // SWITCH ENTRE TABS
  // ============================================
  
  function switchToColab() {
    tabColab.classList.add('active');
    tabAdmin.classList.remove('active');
    formColab.style.display = 'block';
    formAdmin.style.display = 'none';
    hideError();
    inputUser.focus();
  }

  function switchToAdmin() {
    tabAdmin.classList.add('active');
    tabColab.classList.remove('active');
    formAdmin.style.display = 'block';
    formColab.style.display = 'none';
    hideError();
    inputPassAdmin.focus();
  }

  // ============================================
  // EVENT LISTENERS
  // ============================================
  
  btnColab.addEventListener('click', handleLoginColaborador);
  btnAdmin.addEventListener('click', handleLoginAdmin);
  tabColab.addEventListener('click', switchToColab);
  tabAdmin.addEventListener('click', switchToAdmin);
  
  // Enter key handlers
  inputPassColab.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLoginColaborador();
  });
  
  inputPassAdmin.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLoginAdmin();
  });
  
  inputUser.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') inputPassColab.focus();
  });

  // ============================================
  // VERIFICAR SE JÁ ESTÁ LOGADO
  // ============================================
  
  const currentUser = getCurrentUser();
  if (currentUser) {
    // Se já está logado, redirecionar para a página apropriada
    if (currentUser.type === 'admin') {
      window.location.href = 'admin.html';
    } else if (currentUser.type === 'colaborador') {
      window.location.href = 'dashboard.html';
    }
  }
  
  // Focar no campo de utilizador ao carregar a página
  inputUser.focus();
</script>
</body>
</html>
