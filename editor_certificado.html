<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Certificado</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F7F5F0;
    padding: 40px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  h1 {
    color: #00338D;
    margin-bottom: 24px;
    font-family: 'Fraunces', serif;
  }
  .fg {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #00338D;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    padding: 12px;
    border: 1px solid #D7DEED;
    border-radius: 8px;
    font-size: 14px;
    background: #F4F7F9;
  }
  .btn {
    background: #00338D;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    margin-right: 12px;
  }
  .btn-success { background: #16a34a; }
  .btn-warning { background: #f59e0b; }
  .preview-area {
    margin-top: 32px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #ddd;
    min-height: 500px;
  }
  .info {
    margin-top: 16px;
    padding: 12px;
    background: #DBEAFE;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
  }
  .config-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin: 20px 0;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎓 Editor de Certificado</h1>
  
  <div class="fg">
    <label>🔗 URL da Imagem de Fundo</label>
    <input type="text" id="imagemUrl" value="https://hsebirk-droid.github.io/hse-platform/imagens/fundo_certificado.png">
  </div>
  
  <div class="config-row">
    <div class="fg"><label>Nome (Top %)</label><input type="number" id="nomeTop" value="45"></div>
    <div class="fg"><label>Texto "concluiu" (Top %)</label><input type="number" id="textoTop" value="55"></div>
    <div class="fg"><label>Formação (Top %)</label><input type="number" id="formacaoTop" value="63"></div>
    <div class="fg"><label>Nota/Data/ID (Bottom %)</label><input type="number" id="bottomPos" value="10"></div>
  </div>
  
  <div style="text-align: center;">
    <button class="btn" onclick="gerarPreview()">👁️ Ver Certificado</button>
    <button class="btn btn-success" onclick="salvarConfig()">💾 Salvar</button>
    <button class="btn btn-warning" onclick="resetarConfig()">↺ Restaurar</button>
  </div>
  
  <div class="preview-area" id="previewArea"></div>
  <div class="info" id="infoMsg"></div>
</div>

<script>
  function gerarPreview() {
    const url = document.getElementById('imagemUrl').value;
    const nomeTop = document.getElementById('nomeTop').value;
    const textoTop = document.getElementById('textoTop').value;
    const formacaoTop = document.getElementById('formacaoTop').value;
    const bottomPos = document.getElementById('bottomPos').value;
    
    const hoje = new Date().toLocaleDateString('pt-PT');
    const certId = 'CERT-' + new Date().getFullYear() + '-1234';
    
    const html = `
      <div style="position: relative; background-image: url('${url}'); background-size: cover; background-position: center; min-height: 550px;">
        <div style="position: absolute; top: ${nomeTop}%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%;">
          <div style="font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; color: #00338D;">João Silva</div>
          <div style="font-size: 1rem; color: #616365; margin-top: 8px;">concluiu com sucesso a formação</div>
          <div style="font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 700; color: #C5A059; margin-top: 8px;">Formação Exemplo</div>
        </div>
        <div style="position: absolute; bottom: ${bottomPos}%; left: 12%; text-align: center;">
          <div style="font-size: 0.7rem; color: #616365;">NOTA FINAL</div>
          <div style="font-size: 1.3rem; font-weight: 700; color: #00338D;">85%</div>
        </div>
        <div style="position: absolute; bottom: ${bottomPos}%; left: 50%; transform: translateX(-50%); text-align: center;">
          <div style="font-size: 0.7rem; color: #616365;">DATA</div>
          <div style="font-size: 1rem; font-weight: 600; color: #00338D;">${hoje}</div>
        </div>
        <div style="position: absolute; bottom: ${bottomPos}%; right: 12%; text-align: center;">
          <div style="font-size: 0.7rem; color: #616365;">CERTIFICADO ID</div>
          <div style="font-size: 0.8rem; font-weight: 600; color: #00338D;">${certId}</div>
        </div>
      </div>
    `;
    
    document.getElementById('previewArea').innerHTML = html;
    document.getElementById('infoMsg').innerHTML = `✅ Imagem carregada: ${url}`;
  }
  
  function salvarConfig() {
    const config = {
      url: document.getElementById('imagemUrl').value,
      nomeTop: document.getElementById('nomeTop').value,
      textoTop: document.getElementById('textoTop').value,
      formacaoTop: document.getElementById('formacaoTop').value,
      bottomPos: document.getElementById('bottomPos').value
    };
    localStorage.setItem('cert_config', JSON.stringify(config));
    alert('✅ Configuração salva!');
  }
  
  function resetarConfig() {
    localStorage.removeItem('cert_config');
    document.getElementById('imagemUrl').value = 'https://hsebirk-droid.github.io/hse-platform/imagens/fundo_certificado.png';
    document.getElementById('nomeTop').value = '45';
    document.getElementById('textoTop').value = '55';
    document.getElementById('formacaoTop').value = '63';
    document.getElementById('bottomPos').value = '10';
    alert('↺ Configuração restaurada!');
    gerarPreview();
  }
  
  function carregarConfig() {
    const saved = localStorage.getItem('cert_config');
    if (saved) {
      const config = JSON.parse(saved);
      document.getElementById('imagemUrl').value = config.url;
      document.getElementById('nomeTop').value = config.nomeTop;
      document.getElementById('textoTop').value = config.textoTop;
      document.getElementById('formacaoTop').value = config.formacaoTop;
      document.getElementById('bottomPos').value = config.bottomPos;
    }
    gerarPreview();
  }
  
  carregarConfig();
</script>
</body>
</html>
