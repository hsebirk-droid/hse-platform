<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Dashboard</h1>
  <button onclick="window.location.href='admin.html'">Admin</button>
</header>

<div class="container">

  <div class="card">
    <h2>Formação carregada</h2>
    <button onclick="abrirFormacao()">Abrir formação</button>
  </div>

  <iframe id="viewer"></iframe>

</div>

<script>
function abrirFormacao(){
  const url = localStorage.getItem("formacaoURL");
  if(url){
    document.getElementById("viewer").src = url;
  }else{
    alert("Ainda não existe formação carregada.");
  }
}
</script>

</body>
</html>
