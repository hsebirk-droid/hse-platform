<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birkenstock S&CC — Painel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --birkenstock-blue: #00338D;
  --birkenstock-blue-dark: #00277A;
  --birkenstock-gold: #C5A059;
  --birkenstock-gray: #616365;
  --birkenstock-beige: #F7F5F0;
  --bg: #F4F7F9;
  --border: #D7DEED;
  --white: #fff;
  --success: #16a34a;
  --success-bg: #dcfce7;
  --danger: #dc2626;
  --danger-bg: #fee2e2;
  --warning: #f59e0b;
  --warning-bg: #fef3c7;
  --info: #3b82f6;
  --info-bg: #dbeafe;
  --purple: #8b5cf6;
  --purple-bg: #ede9fe;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--birkenstock-beige); color: #1a1a1a; }

header {
  background: var(--birkenstock-blue);
  padding: 13px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--birkenstock-gold);
  flex-wrap: wrap;
  gap: 16px;
}
header .logo-text {
  font-weight: 700;
  font-size: 1.2rem;
  color: white;
  line-height: 1.2;
}
header .logo-text small {
  font-size: 0.7rem;
  font-weight: 400;
  display: block;
  color: rgba(255,255,255,0.7);
}
.btn-sair {
  background: transparent;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px;
  color: rgba(255,255,255,.7);
  padding: 7px 16px;
  cursor: pointer;
}
.btn-sair:hover { border-color: rgba(255,255,255,.7); color: #fff; }

.container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}
.dash-card {
  background: var(--white);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.dash-card:hover { transform: translateY(-2px); }
.dash-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.dash-info h3 { font-size: 24px; font-weight: 700; }
.dash-info p { font-size: 12px; color: var(--birkenstock-gray); }

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  background: var(--white);
  padding: 8px 16px;
  border-radius: 12px;
  flex-wrap: wrap;
  overflow-x: auto;
}
.tab {
  padding: 10px 20px;
  background: none;
  border: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--birkenstock-gray);
  cursor: pointer;
  border-radius: 8px;
  white-space: nowrap;
}
.tab.active { background: var(--birkenstock-blue); color: white; }
.tab:hover:not(.active) { background: var(--bg); color: var(--birkenstock-blue); }

.sec { background: var(--white); border-radius: 12px; margin-bottom: 28px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.sec.active { display: block; }
.sec-head { background: var(--birkenstock-blue); padding: 16px 24px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.sec-head h2 { color: #fff; font-size: 15px; font-weight: 700; text-transform: uppercase; }
.sec-body { padding: 24px; }

.fg { margin-bottom: 16px; }
.fg label { display: block; font-size: 11px; font-weight: 700; color: var(--birkenstock-blue); margin-bottom: 5px; text-transform: uppercase; }
.fg input, .fg select, .fg textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 14px;
  outline: none;
}
.fg input:focus { border-color: var(--birkenstock-blue); }
.frow { display: flex; gap: 16px; flex-wrap: wrap; }
.frow .fg { flex: 1; min-width: 200px; }

.btn { background: var(--birkenstock-blue); color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
.btn:hover { background: var(--birkenstock-blue-dark); }
.btn-sm { width: auto; padding: 8px 16px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
.btn-success { background: var(--success); }
.btn-danger { background: var(--danger); }
.btn-warning { background: var(--warning); }

.item-list { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; max-height: 500px; overflow-y: auto; }
.item-card { background: var(--bg); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.item-card:hover { background: #eef2ff; }
.item-card-info { flex: 1; }
.item-card-title { font-weight: 700; font-size: 14px; }
.item-card-meta { font-size: 11px; color: var(--birkenstock-gray); margin-top: 4px; }
.item-card-actions { display: flex; gap: 8px; }

.colab-selector { background: var(--bg); padding: 16px; border-radius: 8px; margin-bottom: 16px; }
.colab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 12px; max-height: 300px; overflow-y: auto; }
.colab-check { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; background: white; cursor: pointer; }
.colab-check:hover { background: var(--info-bg); }

.modulo-card, .pergunta-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}
.modulo-header, .pergunta-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.modulo-titulo { font-weight: 700; color: var(--birkenstock-blue); }

.cert-editor { background: var(--bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.cert-preview { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 40px; margin-top: 20px; }
.placeholder-badge { background: var(--info-bg); color: var(--info); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-family: monospace; cursor: pointer; display: inline-block; margin: 4px; }

.password-strength { height: 4px; margin-top: 6px; border-radius: 2px; background: #e2e8f0; }
.strength-weak { background: var(--danger); width: 33%; }
.strength-medium { background: var(--warning); width: 66%; }
.strength-strong { background: var(--success); width: 100%; }

.alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
.alert-info { background: var(--info-bg); color: var(--info); }
.alert-warning { background: var(--warning-bg); color: var(--warning); }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { font-size: 11px; font-weight: 700; color: var(--birkenstock-gray); text-transform: uppercase; }
.empty { text-align: center; padding: 40px; color: var(--birkenstock-gray); }

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: var(--white);
  border-radius: 16px;
  max-width: 700px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.modal-close { cursor: pointer; font-size: 24px; color: var(--birkenstock-gray); }

.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.badge-success { background: var(--success-bg); color: var(--success); }

@media (max-width: 768px) {
  .container { padding: 20px 16px; }
  .sec-body { padding: 16px; }
  .tabs { padding: 8px; }
  .tab { padding: 8px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<header>
  <div class="logo-text">
    BIRKENSTOCK
    <small>S&CC Portugal · Formação</small>
  </div>
  <button class="btn-sair" onclick="location.href='index.html'">Sair</button>
</header>

<div class="container">
  <div class="dashboard-grid" id="dashboard-grid"></div>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
    <button class="tab" data-tab="lista-formacoes">📚 Formações</button>
    <button class="tab" data-tab="formacao">🎓 Criar Formação</button>
    <button class="tab" data-tab="atribuir">📨 Atribuir</button>
    <button class="tab" data-tab="certificado">🏅 Certificado</button>
    <button class="tab" data-tab="colaboradores">👥 Colaboradores</button>
    <button class="tab" data-tab="seguranca">🔐 Segurança</button>
    <button class="tab" data-tab="historico">📊 Histórico</button>
  </div>

  <!-- Restante do conteúdo do admin igual ao seu admin atual -->
  <!-- ... (manter o resto do admin.html igual) ... -->
</div>

<!-- Scripts do admin... -->
</body>
</html>
