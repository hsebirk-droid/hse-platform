<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birkenstock S&CC — Formação</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --birkenstock-blue: #00338D;
  --birkenstock-blue-dark: #00277A;
  --birkenstock-gold: #C5A059;
  --birkenstock-gray: #616365;
  --birkenstock-beige: #F7F5F0;
  --white: #fff;
  --success: #10B981;
  --success-bg: #D1FAE5;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --danger: #EF4444;
  --danger-bg: #FEE2E2;
  --font-head: 'Fraunces', serif;
  --font-body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--birkenstock-beige); font-family: var(--font-body); }

.top-bar {
  background: var(--birkenstock-blue);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  border-bottom: 2px solid var(--birkenstock-gold);
}
.top-bar .logo {
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
}
.top-bar .logo span {
  font-size: 0.7rem;
  display: block;
  color: rgba(255,255,255,0.8);
}
.deadline-badge {
  background: rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 6px 16px;
  font-size: 0.8rem;
  color: white;
}
.user-name {
  background: rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 6px 16px;
  font-size: 0.8rem;
  color: white;
}
.btn-exit {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 6px 16px;
  border-radius: 30px;
  cursor: pointer;
}

.hero {
  background: linear-gradient(135deg, var(--birkenstock-blue), var(--birkenstock-blue-dark));
  padding: 48px 32px;
  color: white;
}
.hero-inner { max-width: 800px; margin: 0 auto; }
.hero h1 { font-family: var(--font-head); font-size: 2rem; margin-bottom: 16px; }
.hero-meta { display: flex; gap: 24px; margin-top: 24px; flex-wrap: wrap; }
.hero-meta-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 6px 16px; border-radius: 30px; }

.progress-strip {
  background: white;
  padding: 16px 32px;
  border-bottom: 1px solid #ddd;
  position: sticky;
  top: 0;
  z-index: 100;
}
.progress-strip-inner { max-width: 800px; margin: 0 auto; }
.progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.8rem; }
.prog-track { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--birkenstock-blue), var(--birkenstock-gold)); width: 0%; transition: width 0.3s; }

.main { max-width: 800px; margin: 0 auto; padding: 32px; }
.section-block {
  background: white;
  border-radius: 16px;
  margin-bottom: 24px;
  border: 1px solid #e0e0e0;
  overflow: hidden;
}
.section-block.locked { opacity: 0.6; pointer-events: none; }
.section-header {
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  background: #fafafa;
}
.section-header:hover { background: #f5f5f5; }
.s-num {
  width: 40px;
  height: 40px;
  background: #e0e0e0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.section-block.completed .s-num { background: var(--birkenstock-blue); color: white; }
.s-title { font-weight: 700; font-size: 1.1rem; color: var(--birkenstock-blue); }
.section-body { padding: 24px; border-top: 1px solid #e0e0e0; display: none; }
.section-body.open { display: block; }
.text-content { line-height: 1.6; color: #555; margin: 16px 0; }
.video-wrap { margin: 16px 0; }
.video-wrap iframe { width: 100%; height: 400px; border: none; border-radius: 12px; }
.doc-viewer { margin: 16px 0; }
.doc-iframe { width: 100%; height: 500px; border: none; border-radius: 12px; }
.confirm-viewed {
  background: #f5f5f5;
  padding: 16px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  flex-wrap: wrap;
  gap: 16px;
}
.btn-confirm {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
}
.btn-confirm:hover { background: var(--birkenstock-blue-dark); }
.confirmed-label { color: var(--success); background: var(--success-bg); padding: 8px 16px; border-radius: 30px; display: inline-block; }
.quiz-intro { background: var(--warning-light); padding: 20px; border-radius: 12px; margin: 20px 0; }
.question { margin-bottom: 24px; }
.question-text { font-weight: 700; margin-bottom: 12px; color: var(--birkenstock-blue); }
.options { display: flex; flex-direction: column; gap: 10px; }
.option-item {
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
}
.option-item:hover { background: #f5f5f5; }
.option-item.selected { border-color: var(--birkenstock-blue); background: #eef2ff; }
.option-letter {
  width: 28px;
  height: 28px;
  background: #e0e0e0;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.quiz-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
.btn-submit {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  padding: 12px 32px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
}
.btn-submit:disabled { background: #ccc; }
.result-screen { text-align: center; padding: 40px; display: none; }
.result-score-ring {
  width: 120px;
  height: 120px;
  border: 6px solid var(--birkenstock-blue);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}
.result-score-ring.fail { border-color: var(--danger); background: var(--danger-bg); }
.score-num { font-size: 2rem; font-weight: 700; color: var(--birkenstock-blue); }
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 1000;
}
.toast.show { opacity: 1; }
.loading { text-align: center; padding: 60px; color: #666; }

/* Botões do certificado */
.cert-actions {
  text-align: center;
  margin-top: 30px;
  padding: 20px;
}
.action-btn {
  background: #00338D;
  color: white;
  border: none;
  padding: 14px 32px;
  border-radius: 40px;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  display: inline-block;
  margin: 0 10px;
  min-width: 200px;
  transition: all 0.2s;
}
.action-btn:hover {
  background: #00277A;
  transform: translateY(-2px);
}
.action-btn-secondary {
  background: white;
  color: #00338D;
  border: 2px solid #00338D;
}
.action-btn-secondary:hover {
  background: #00338D;
  color: white;
}
.action-btn-download {
  background: #10B981;
}
.action-btn-download:hover {
  background: #059669;
}

@media (max-width: 768px) {
  .top-bar { padding: 12px 20px; }
  .hero { padding: 32px 20px; }
  .hero h1 { font-size: 1.5rem; }
  .main { padding: 20px; }
  .section-header { padding: 16px; }
  .section-body { padding: 16px; }
  .action-btn { padding: 10px 20px; min-width: 160px; font-size: 0.9rem; margin: 5px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">BIRKENSTOCK<span>S&CC PORTUGAL</span></div>
  <div class="user-name" id="user-name-display">Carregando...</div>
  <div class="deadline-badge">Prazo: <strong id="prazo-data">---</strong></div>
  <button class="btn-exit" onclick="sair()">Sair</button>
</div>

<div class="hero">
  <div class="hero-inner">
    <h1 id="hero-title">Carregando formação...</h1>
    <p id="hero-desc"></p>
    <div class="hero-meta">
      <div class="hero-meta-item">⏱️ <span id="meta-duration">--</span></div>
      <div class="hero-meta-item">📚 <span id="meta-modules">-- módulos</span></div>
      <div class="hero-meta-item">📝 Avaliação</div>
      <div class="hero-meta-item">🏅 Certificado</div>
    </div>
  </div>
</div>

<div class="progress-strip">
  <div class="progress-strip-inner">
    <div class="progress-label"><span>Progresso</span><strong id="progress-text">0%</strong></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  </div>
</div>

<div class="main">
  <div id="loading" class="loading">📚 A carregar formação...</div>
  <div id="modules-container" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwywvboQgWqkrZlbwrUPdaUq-gLnWM64E",
    authDomain: "plataforma-ssa-3130e.firebaseapp.com",
    projectId: "plataforma-ssa-3130e",
    storageBucket: "plataforma-ssa-3130e.firebasestorage.app",
    messagingSenderId: "850671249674",
    appId: "1:850671249674:web:53a115408f8006745c32f3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.doc = doc;
  window.getDoc = getDoc;
  window.collection = collection;
  window.addDoc = addDoc;
  
  console.log("✅ Firebase OK");
</script>

<script>
  let modules = [];
  let perguntas = [];
  let completedModules = {};
  let quizPassed = false;
  let cursoId = null;
  let nomeUser = localStorage.getItem('usuarioAtivo') || 'Colaborador';
  let cursoData = {};

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function fmtDate(d) {
    return d.toLocaleDateString('pt-PT');
  }

  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function lerTokenUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
      try {
        const decoded = atob(token);
        const data = JSON.parse(decoded);
        if (data.user) {
          localStorage.setItem('usuarioAtivo', data.user);
          nomeUser = data.user;
        }
        if (data.prazo) {
          document.getElementById('prazo-data').textContent = data.prazo;
        }
        if (data.cursoId) {
          return data.cursoId;
        }
      } catch(e) {}
    }
    return localStorage.getItem('cursoAtualId');
  }

  async function carregarFormacao(id) {
    const loadingDiv = document.getElementById('loading');
    const modulesContainer = document.getElementById('modules-container');
    
    loadingDiv.style.display = 'block';
    modulesContainer.style.display = 'none';
    
    if (!id) {
      loadingDiv.innerHTML = '❌ Nenhuma formação selecionada. <a href="dashboard.html">Voltar</a>';
      return;
    }
    
    try {
      const docRef = window.doc(window.db, 'formacoes', id);
      const docSnap = await window.getDoc(docRef);
      
      if (docSnap.exists()) {
        const data = docSnap.data();
        cursoData = {
          nome: data.nome,
          duracao: data.duracao,
          descricao: data.descricao
        };
        modules = data.modulos || [];
        perguntas = data.perguntas || [];
        
        document.getElementById('user-name-display').textContent = nomeUser;
        document.getElementById('hero-title').textContent = cursoData.nome;
        document.getElementById('hero-desc').textContent = cursoData.descricao;
        document.getElementById('meta-duration').textContent = cursoData.duracao;
        document.getElementById('meta-modules').textContent = modules.length + ' módulos';
        
        loadingDiv.style.display = 'none';
        modulesContainer.style.display = 'block';
        
        renderModules();
        updateProgress();
      } else {
        loadingDiv.innerHTML = '❌ Formação não encontrada.';
      }
    } catch(error) {
      loadingDiv.innerHTML = '❌ Erro: ' + error.message;
    }
  }

  function updateProgress() {
    const total = modules.length + 1;
    let done = modules.filter(m => completedModules[String(m.id)]).length;
    if (quizPassed) done++;
    const pct = Math.round((done / total) * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '%';
  }

  function renderModules() {
    const container = document.getElementById('modules-container');
    container.innerHTML = '';
    
    modules.forEach((module, idx) => {
      const moduleIdStr = String(module.id);
      const isCompleted = completedModules[moduleIdStr];
      const isLocked = idx > 0 && !completedModules[String(modules[idx-1]?.id)];
      
      const block = document.createElement('div');
      block.className = `section-block ${isLocked && !isCompleted ? 'locked' : ''} ${isCompleted ? 'completed' : ''}`;
      block.id = 'block-' + moduleIdStr;
      
      block.innerHTML = `
        <div class="section-header" onclick="toggleSection('${moduleIdStr}')">
          <div class="s-num">${idx + 1}</div>
          <div class="s-info">
            <div class="s-title">${escapeHtml(module.titulo || 'Módulo ' + (idx + 1))}</div>
            <div class="s-meta" style="font-size: 0.75rem; color: #666; margin-top: 4px;">${module.tipo === 'video' ? '🎬 Vídeo' : module.tipo === 'text' ? '📄 Texto' : '📁 Conteúdo'}</div>
          </div>
          <div>${isCompleted ? '✅' : (isLocked ? '🔒' : '▶')}</div>
        </div>
        <div class="section-body" id="body-${moduleIdStr}">
          <div id="content-${moduleIdStr}" style="min-height: 200px;">Carregando conteúdo...</div>
          <div class="confirm-viewed">
            <span>✅ Após visualizar o conteúdo, clique para confirmar</span>
            <button class="btn-confirm" id="btn-confirm-${moduleIdStr}" onclick="confirmModule('${moduleIdStr}')">✓ Confirmar conclusão</button>
          </div>
          <div id="confirmed-${moduleIdStr}" style="display:none; margin-top:10px;" class="confirmed-label">✅ Módulo concluído</div>
        </div>
      `;
      container.appendChild(block);
      
      // Carregar conteúdo
      setTimeout(() => {
        const url = module.conteudo?.url || '';
        const contentDiv = document.getElementById(`content-${moduleIdStr}`);
        
        if (module.tipo === 'text' && module.conteudo?.texto) {
          contentDiv.innerHTML = `<div class="text-content">${module.conteudo.texto}</div>`;
        }
        else if (url) {
          if (url.includes('youtube.com') || url.includes('youtu.be')) {
            let videoId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            contentDiv.innerHTML = `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>`;
          } else if (url.includes('drive.google.com')) {
            let fileId = url.match(/[-\w]{25,}/)?.[0];
            let embedUrl = fileId ? `https://drive.google.com/file/d/${fileId}/preview` : url;
            contentDiv.innerHTML = `<div class="doc-viewer"><iframe src="${embedUrl}" class="doc-iframe" allow="autoplay"></iframe></div>`;
          } else {
            contentDiv.innerHTML = `<div class="doc-viewer"><iframe src="${url}" class="doc-iframe" allow="autoplay"></iframe></div>`;
          }
        }
        else {
          contentDiv.innerHTML = '<div class="text-content">Conteúdo não disponível.</div>';
        }
      }, 100);
    });
    
    renderQuiz();
  }

  function confirmModule(moduleId) {
    const btn = document.getElementById(`btn-confirm-${moduleId}`);
    if (!btn) return;
    
    const moduleIdStr = String(moduleId);
    completedModules[moduleIdStr] = true;
    
    const block = document.getElementById('block-' + moduleIdStr);
    if (block) block.classList.add('completed');
    
    btn.style.display = 'none';
    
    const confirmedDiv = document.getElementById(`confirmed-${moduleIdStr}`);
    if (confirmedDiv) confirmedDiv.style.display = 'block';
    
    toast('✅ Módulo concluído!');
    updateProgress();
    
    const currentBody = document.getElementById(`body-${moduleIdStr}`);
    if (currentBody) currentBody.classList.remove('open');
    
    const idx = modules.findIndex(m => String(m.id) === moduleIdStr);
    
    if (idx === modules.length - 1) {
      const quizBlock = document.getElementById('block-quiz');
      if (quizBlock) {
        quizBlock.classList.remove('locked');
        const statusQuiz = document.getElementById('status-quiz');
        if (statusQuiz) statusQuiz.innerHTML = '📝';
        
        const quizBody = document.getElementById('body-quiz');
        if (quizBody) {
          quizBody.classList.add('open');
          setTimeout(() => {
            quizBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
        toast('📝 Avaliação final desbloqueada!');
      }
    } 
    else {
      const nextModuleId = String(modules[idx + 1].id);
      const nextBlock = document.getElementById(`block-${nextModuleId}`);
      if (nextBlock) {
        nextBlock.classList.remove('locked');
        
        const nextBody = document.getElementById(`body-${nextModuleId}`);
        if (nextBody) {
          nextBody.classList.add('open');
          setTimeout(() => {
            nextBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
        toast('📚 Próximo módulo desbloqueado!');
      }
    }
  }

  function renderQuiz() {
    const container = document.getElementById('modules-container');
    const quizBlock = document.createElement('div');
    quizBlock.className = 'section-block locked';
    quizBlock.id = 'block-quiz';
    quizBlock.innerHTML = `
      <div class="section-header" onclick="toggleSection('quiz')">
        <div class="s-num">📝</div>
        <div class="s-info">
          <div class="s-title">Avaliação Final</div>
          <div>Nota mínima: 70%</div>
        </div>
        <div id="status-quiz">🔒</div>
      </div>
      <div class="section-body" id="body-quiz">
        <div id="quiz-questions"></div>
        <div class="quiz-footer">
          <span id="quiz-answered">0 respondidas</span>
          <button class="btn-submit" id="btn-submit" disabled onclick="submitQuiz()">Submeter</button>
        </div>
        <div class="result-screen" id="result-screen">
          <div class="result-score-ring" id="result-ring">
            <div class="score-num" id="score-num">0%</div>
          </div>
          <h2 id="result-title"></h2>
          <p id="result-msg"></p>
          <div class="result-actions">
            <button class="btn-dl" id="btn-see-cert" onclick="showCertificate()" style="display:none">🏅 Ver Certificado</button>
            <button class="btn-secondary" id="btn-retry" onclick="retryQuiz()" style="display:none">🔄 Tentar novamente</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(quizBlock);
    
    if (!perguntas.length) {
      perguntas = [
        { texto: "Qual é a melhor forma de aprender?", opcoes: ["Praticar", "Só ler", "Decorar", "Ignorar"], correta: "A" }
      ];
    }
    
    const questionsDiv = document.getElementById('quiz-questions');
    questionsDiv.innerHTML = perguntas.map((q, idx) => `
      <div class="question">
        <div class="question-text">${escapeHtml(q.texto)}</div>
        <div class="options" id="opts-${idx}">
          ${q.opcoes.map((opt, i) => `
            <div class="option-item" onclick="selectOpt(${idx}, ${i})">
              <div class="option-letter">${String.fromCharCode(65+i)}</div>
              ${escapeHtml(opt)}
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
    
    window.perguntas = perguntas;
    window.respostas = {};
    window.totalPerguntas = perguntas.length;
  }

  function selectOpt(qIdx, optIdx) {
    document.querySelectorAll(`#opts-${qIdx} .option-item`).forEach(el => el.classList.remove('selected'));
    document.querySelectorAll(`#opts-${qIdx} .option-item`)[optIdx].classList.add('selected');
    window.respostas[qIdx] = String.fromCharCode(65 + optIdx);
    const answered = Object.keys(window.respostas).length;
    document.getElementById('quiz-answered').textContent = `${answered} de ${window.totalPerguntas} respondidas`;
    document.getElementById('btn-submit').disabled = answered < window.totalPerguntas;
  }

  async function submitQuiz() {
    let score = 0;
    for (let i = 0; i < window.totalPerguntas; i++) {
      if (window.respostas[i] === window.perguntas[i].correta) score++;
    }
    const pct = Math.round((score / window.totalPerguntas) * 100);
    const passed = pct >= 70;
    quizPassed = passed;
    
    document.getElementById('quiz-questions').style.display = 'none';
    document.querySelector('.quiz-footer').style.display = 'none';
    const rs = document.getElementById('result-screen');
    rs.style.display = 'block';
    document.getElementById('score-num').textContent = pct + '%';
    
    if (passed) {
      document.getElementById('result-title').textContent = '🎉 Aprovado!';
      document.getElementById('result-msg').innerHTML = `Acertaste ${score} de ${window.totalPerguntas} (${pct}%)`;
      document.getElementById('btn-see-cert').style.display = 'inline-block';
      updateProgress();
      
      try {
        await window.addDoc(window.collection(window.db, 'historico'), {
          nome: nomeUser,
          curso: cursoData.nome,
          nota: pct + '%',
          data: fmtDate(new Date()),
          dataTimestamp: Date.now()
        });
        toast('✅ Certificado gerado!');
      } catch(e) { console.error(e); }
    } else {
      document.getElementById('result-ring').classList.add('fail');
      document.getElementById('result-title').textContent = '❌ Não aprovado';
      document.getElementById('result-msg').innerHTML = `Obtiveste ${pct}% (${score}/${window.totalPerguntas} corretas).<br>Precisas de pelo menos 70%. Podes tentar novamente.`;
      document.getElementById('btn-retry').style.display = 'inline-block';
      toast('⚠️ Não atingiu a nota mínima. Tente novamente!');
    }
  }

  function retryQuiz() {
    window.respostas = {};
    for (let i = 0; i < window.totalPerguntas; i++) {
      document.querySelectorAll(`#opts-${i} .option-item`).forEach(el => {
        el.classList.remove('selected', 'correct', 'wrong');
        el.onclick = () => selectOpt(i, Array.from(el.parentNode.children).indexOf(el));
      });
    }
    document.getElementById('quiz-questions').style.display = 'block';
    document.querySelector('.quiz-footer').style.display = 'flex';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('quiz-answered').textContent = `0 de ${window.totalPerguntas} respondidas`;
    document.getElementById('result-ring').classList.remove('fail');
    toast('🔄 Quiz reiniciado. Boa sorte!');
  }

  // ==================== FUNÇÕES DO CERTIFICADO ====================
  
  async function descarregarPDF() {
    const element = document.getElementById('certificado-para-pdf');
    if (!element) {
      toast('❌ Erro: elemento do certificado não encontrado');
      return;
    }
    
    toast('📄 A gerar PDF...');
    
    try {
      const canvas = await html2canvas(element, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false
      });
      
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      
      const imgWidth = 190;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      
      const pdf = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: 'a4'
      });
      
      const xOffset = (210 - imgWidth) / 2;
      const yOffset = (297 - imgHeight) / 2;
      
      pdf.addImage(imgData, 'PNG', xOffset, yOffset, imgWidth, imgHeight);
      pdf.save(`certificado_${nomeUser.replace(/\s/g, '_')}.pdf`);
      toast('✅ PDF guardado!');
    } catch (err) {
      console.error(err);
      toast('❌ Erro ao gerar PDF');
    }
  }
  
  async function imprimirCertificado() {
    const element = document.getElementById('certificado-para-pdf');
    if (!element) {
      toast('❌ Erro: certificado não encontrado');
      return;
    }
    
    toast('🖨️ A preparar impressão...');
    
    try {
      const canvas = await html2canvas(element, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false
      });
      
      const imageData = canvas.toDataURL('image/png');
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Certificado - ${nomeUser}</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: white; }
            .cert-container { width: 210mm; margin: 0 auto; }
            .cert-image { width: 100%; height: auto; display: block; }
            @media print { body { margin: 0; padding: 0; } .cert-container { width: 100%; margin: 0; } }
          </style>
        </head>
        <body>
          <div class="cert-container"><img src="${imageData}" class="cert-image" alt="Certificado"></div>
          <script>
            window.onload = function() { setTimeout(function() { window.print(); setTimeout(function() { window.close(); }, 1000); }, 500); };
          <\/script>
        </body>
        </html>
      `);
      printWindow.document.close();
    } catch (err) {
      console.error(err);
      toast('❌ Erro ao preparar impressão');
    }
  }

  async function showCertificate() {
    const now = new Date();
    const certId = 'CERT-' + new Date().getFullYear() + '-' + Math.floor(1000 + Math.random() * 9000);
    const nota = document.getElementById('score-num').textContent;
    
    let fundoImagem = 'imagens/fundo_certificado.png';
    const certTemplateSalvo = localStorage.getItem('cert_template');
    if (certTemplateSalvo) {
      try {
        const template = JSON.parse(certTemplateSalvo);
        if (template.fundoImagem) {
          fundoImagem = template.fundoImagem;
        }
      } catch(e) {}
    }
    
    if (!fundoImagem.startsWith('http') && !fundoImagem.startsWith('data:')) {
      fundoImagem = window.location.origin + window.location.pathname.replace('formacao_colaborador.html', '') + fundoImagem;
    }
    
    const certHtml = `
      <div class="cert-screen" style="display:block; margin-top: 30px;">
        <div id="certificado-para-pdf" style="
          background-image: url('${fundoImagem}');
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          width: 100%;
          max-width: 210mm;
          margin: 0 auto;
          position: relative;
          border: none;
          border-radius: 0;
          padding: 40px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        ">
          <div style="position: relative; z-index: 2; text-align: center;">
            <div style="font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; color: #00338D; margin-bottom: 20px;">${escapeHtml(nomeUser)}</div>
            <div style="font-size: 1.2rem; color: #616365; margin-bottom: 20px;">concluiu com sucesso a formação</div>
            <div style="font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: #C5A059; margin-bottom: 40px;">${escapeHtml(cursoData.nome)}</div>
            <div style="display: flex; justify-content: center; gap: 60px; margin-top: 20px; flex-wrap: wrap;">
              <div style="text-align: center;">
                <div style="font-size: 0.8rem; color: #616365;">NOTA FINAL</div>
                <div style="font-size: 1.5rem; font-weight: 700; color: #00338D;">${nota}</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 0.8rem; color: #616365;">DATA</div>
                <div style="font-size: 1rem; font-weight: 600; color: #00338D;">${fmtDate(now)}</div>
              </div>
              <div style="text-align: center;">
                <div style="font-size: 0.8rem; color: #616365;">CERTIFICADO ID</div>
                <div style="font-family: monospace; font-size: 0.9rem; font-weight: 600; color: #00338D;">${certId}</div>
              </div>
            </div>
          </div>
        </div>
        <div class="cert-actions">
          <button class="action-btn action-btn-download" onclick="descarregarPDF()">
            <i class="fas fa-file-pdf"></i> Descarregar PDF
          </button>
          <button class="action-btn" onclick="imprimirCertificado()">
            <i class="fas fa-print"></i> Imprimir Certificado
          </button>
          <button class="action-btn action-btn-secondary" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-home"></i> Voltar ao Dashboard
          </button>
        </div>
      </div>
    `;
    
    const existingCert = document.getElementById('cert-screen');
    if (existingCert) existingCert.remove();
    
    document.getElementById('modules-container').insertAdjacentHTML('beforeend', certHtml);
    
    setTimeout(() => {
      const certScreen = document.getElementById('cert-screen');
      if (certScreen) certScreen.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
    
    toast('🏅 Certificado gerado!');
  }

  function toggleSection(id) {
    if (id === 'quiz') {
      const block = document.getElementById('block-quiz');
      if (block && block.classList.contains('locked')) {
        toast('Complete os módulos primeiro!');
        return;
      }
      const bodyQuiz = document.getElementById('body-quiz');
      if (bodyQuiz) bodyQuiz.classList.toggle('open');
    } else {
      const block = document.getElementById('block-' + id);
      if (block && block.classList.contains('locked')) {
        toast('Complete o módulo anterior!');
        return;
      }
      const body = document.getElementById('body-' + id);
      if (body) body.classList.toggle('open');
    }
  }

  function sair() {
    if (confirm('Sair?')) window.location.href = 'dashboard.html';
  }

  window.toggleSection = toggleSection;
  window.selectOpt = selectOpt;
  window.submitQuiz = submitQuiz;
  window.retryQuiz = retryQuiz;
  window.showCertificate = showCertificate;
  window.confirmModule = confirmModule;
  window.sair = sair;
  window.descarregarPDF = descarregarPDF;
  window.imprimirCertificado = imprimirCertificado;

  window.addEventListener('load', () => {
    if (!localStorage.getItem('usuarioAtivo')) {
      window.location.href = 'login.html';
      return;
    }
    nomeUser = localStorage.getItem('usuarioAtivo');
    document.getElementById('user-name-display').textContent = nomeUser;
    
    const cursoIdCarregado = lerTokenUrl();
    if (cursoIdCarregado) {
      cursoId = cursoIdCarregado;
      carregarFormacao(cursoIdCarregado);
    } else {
      document.getElementById('loading').innerHTML = '❌ Nenhuma formação. <a href="dashboard.html">Voltar</a>';
    }
  });
</script>
