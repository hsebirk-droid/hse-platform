<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birkenstock S&CC — Formação</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --birkenstock-blue: #00338D;
  --birkenstock-blue-dark: #00277A;
  --birkenstock-gold: #C5A059;
  --birkenstock-gray: #616365;
  --birkenstock-beige: #F7F5F0;
  --birkenstock-white: #FFFFFF;
  --birkenstock-black: #1A1A1A;
  --birkenstock-border: #E2DDD6;
  --success: #16a34a;
  --success-bg: #dcfce7;
  --warning: #e76f51;
  --warning-light: #fde8e1;
  --info: #2196f3;
  --info-light: #e3f2fd;
  --font-head: 'Fraunces', serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 14px;
  --shadow: 0 2px 20px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--birkenstock-beige); font-family: var(--font-body); color: var(--birkenstock-black); min-height: 100vh; }

.top-bar {
  background: var(--birkenstock-blue);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  border-bottom: 2px solid var(--birkenstock-gold);
}
.top-bar .logo {
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
}
.top-bar .logo span {
  font-size: 0.7rem;
  font-weight: 400;
  display: block;
  color: rgba(255,255,255,0.8);
}
.deadline-badge {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 0.78rem;
  color: rgba(255,255,255,0.8);
}
.deadline-badge strong { color: var(--birkenstock-gold); }
.user-name {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 0.78rem;
  color: white;
}

.hero {
  background: linear-gradient(135deg, var(--birkenstock-blue) 0%, var(--birkenstock-blue-dark) 100%);
  padding: 48px 32px 56px;
  color: white;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: 'BIRKENSTOCK';
  position: absolute;
  right: -20px;
  top: -30px;
  font-family: var(--font-head);
  font-size: 8rem;
  font-weight: 900;
  color: rgba(255,255,255,0.03);
  pointer-events: none;
}
.hero-inner { max-width: 760px; margin: 0 auto; }
.hero-tag {
  display: inline-block;
  background: rgba(197,160,89,0.2);
  border: 1px solid rgba(197,160,89,0.4);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  margin-bottom: 16px;
  color: var(--birkenstock-gold);
}
.hero h1 { font-family: var(--font-head); font-size: 2.2rem; font-weight: 900; line-height: 1.15; margin-bottom: 12px; }
.hero p { font-size: 0.95rem; opacity: .8; line-height: 1.6; max-width: 520px; }
.hero-meta { display: flex; gap: 24px; margin-top: 24px; flex-wrap: wrap; }
.hero-meta-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; opacity: .85; }

.progress-strip {
  background: var(--birkenstock-white);
  border-bottom: 1px solid var(--birkenstock-border);
  padding: 16px 32px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.progress-strip-inner { max-width: 760px; margin: 0 auto; }
.progress-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--birkenstock-gray); margin-bottom: 8px; }
.progress-label strong { color: var(--birkenstock-black); }
.prog-track { height: 8px; background: #ede9e2; border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--birkenstock-blue), var(--birkenstock-gold)); border-radius: 4px; transition: width .5s ease; }
.steps-dots { display: flex; gap: 8px; margin-top: 10px; }
.step-dot { flex: 1; height: 3px; border-radius: 2px; background: #ede9e2; transition: background .3s; }
.step-dot.done { background: var(--birkenstock-blue); }
.step-dot.active { background: var(--birkenstock-gold); }

.main { max-width: 760px; margin: 0 auto; padding: 32px 32px 80px; }

.section-block {
  background: var(--birkenstock-white);
  border-radius: var(--radius);
  border: 1px solid var(--birkenstock-border);
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.section-block.locked { opacity: .5; pointer-events: none; }
.section-block.completed { border-color: var(--birkenstock-gold); }

.section-header {
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: background 0.2s;
}
.section-header:hover { background: #fafaf8; }
.s-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #f0ece5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 0.85rem;
  font-weight: 700;
  flex-shrink: 0;
}
.section-block.completed .s-num { background: var(--birkenstock-blue); color: white; }
.s-info { flex: 1; }
.s-title { font-family: var(--font-head); font-size: 1rem; font-weight: 700; color: var(--birkenstock-blue); }
.s-meta { font-size: 0.78rem; color: var(--birkenstock-gray); margin-top: 2px; }
.s-status { font-size: 1.1rem; }
.section-body { padding: 0 24px 24px; border-top: 1px solid var(--birkenstock-border); display: none; }
.section-body.open { display: block; }

/* Embed de vídeo */
.video-wrap {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 16/9;
  margin: 20px 0;
}
.video-wrap iframe { width: 100%; height: 100%; border: none; }

/* Visualizador de documentos */
.doc-viewer {
  background: #fafaf8;
  border: 1px solid var(--birkenstock-border);
  border-radius: 10px;
  margin: 20px 0;
  overflow: hidden;
}
.doc-viewer-header {
  background: #f5f5f5;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--birkenstock-border);
  flex-wrap: wrap;
  gap: 10px;
  font-size: 13px;
  color: var(--birkenstock-gray);
}
.doc-content {
  padding: 0;
  min-height: 500px;
  max-height: 650px;
  overflow: auto;
  background: #f5f5f5;
  text-align: center;
}
.doc-iframe {
  width: 100%;
  height: 600px;
  border: none;
}
.doc-image {
  max-width: 100%;
  max-height: 500px;
  object-fit: contain;
  margin: 20px auto;
  display: block;
}
.doc-placeholder {
  padding: 60px;
  text-align: center;
  color: var(--birkenstock-gray);
}

.text-content { font-size: 0.9rem; line-height: 1.8; color: var(--birkenstock-gray); margin: 20px 0; }

.content-tracker {
  background: var(--info-light);
  border: 1px solid #bbdefb;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  color: #1565c0;
}
.track-prog { flex: 1; height: 4px; background: #bbdefb; border-radius: 2px; overflow: hidden; }
.track-fill { height: 100%; background: var(--birkenstock-blue); border-radius: 2px; transition: width .3s; }

.confirm-viewed {
  background: var(--birkenstock-beige);
  border: 1px solid var(--birkenstock-border);
  border-radius: 10px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  gap: 16px;
  flex-wrap: wrap;
}
.confirm-viewed p { font-size: 0.83rem; color: var(--birkenstock-gray); }
.confirm-viewed p strong { color: var(--birkenstock-black); display: block; }
.btn-confirm {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 22px;
  font-family: var(--font-head);
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-confirm:hover:not(:disabled) { background: var(--birkenstock-blue-dark); }
.btn-confirm:disabled { background: var(--birkenstock-gray); cursor: not-allowed; }
.confirmed-label { display: flex; align-items: center; gap: 6px; color: var(--birkenstock-blue); font-size: 0.82rem; font-weight: 600; }

/* Loading spinner */
.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: white;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.btn-loading {
  opacity: 0.7;
  cursor: wait !important;
}

/* Quiz */
.quiz-wrap { padding: 8px 0; }
.quiz-intro { background: var(--warning-light); border: 1px solid #f4a291; border-radius: 10px; padding: 16px 20px; margin: 20px 0; }
.question { margin-bottom: 28px; }
.question-text { font-family: var(--font-head); font-size: 0.98rem; font-weight: 700; margin-bottom: 14px; color: var(--birkenstock-blue); }
.options { display: flex; flex-direction: column; gap: 8px; }
.option-item {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1.5px solid var(--birkenstock-border);
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  font-size: 0.88rem;
  transition: all 0.2s;
}
.option-item:hover { border-color: var(--birkenstock-gold); background: rgba(197,160,89,0.1); }
.option-item.selected { border-color: var(--birkenstock-blue); background: rgba(0,51,141,0.05); }
.option-item.correct { border-color: var(--success); background: var(--success-bg); }
.option-item.wrong { border-color: var(--warning); background: var(--warning-light); }
.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #f0ece5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}
.option-item.selected .option-letter { background: var(--birkenstock-blue); color: white; }
.quiz-footer { margin-top: 24px; border-top: 1px solid var(--birkenstock-border); padding-top: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.btn-submit {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 13px 32px;
  font-family: var(--font-head);
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-submit:disabled { background: #ccc; cursor: not-allowed; }

.result-screen { text-align: center; padding: 40px 24px; display: none; }
.result-score-ring {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 6px solid var(--birkenstock-blue);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  background: rgba(0,51,141,0.05);
}
.result-score-ring.fail { border-color: var(--warning); background: var(--warning-light); }
.score-num { font-family: var(--font-head); font-size: 2rem; font-weight: 900; color: var(--birkenstock-blue); }

.cert-screen { display: none; }
.cert-card {
  background: linear-gradient(135deg, #fff8e7 0%, #fff 100%);
  border: 2px solid var(--birkenstock-gold);
  border-radius: 20px;
  padding: 48px 40px;
  text-align: center;
  position: relative;
  margin-top: 24px;
}
.cert-card::before {
  content: '';
  position: absolute;
  inset: 10px;
  border: 1px dashed rgba(197,160,89,0.5);
  border-radius: 14px;
  pointer-events: none;
}
.cert-emblem { font-size: 3rem; margin-bottom: 16px; color: var(--birkenstock-gold); }
.cert-name { font-family: var(--font-head); font-size: 2rem; font-weight: 900; color: var(--birkenstock-blue); margin-bottom: 8px; }
.cert-row {
  display: flex;
  justify-content: center;
  gap: 48px;
  border-top: 1px solid #e2ddd6;
  padding-top: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.cert-col { margin: 0 12px; }
.cert-col-label { font-size: 0.75rem; color: var(--birkenstock-gray); text-transform: uppercase; }
.cert-col-val { font-family: var(--font-head); font-size: 1rem; font-weight: 700; color: var(--birkenstock-blue); margin-top: 4px; }
.cert-id { font-size: 0.75rem; color: var(--birkenstock-gray); margin-top: 12px; }
.cert-course-title { font-size: 1.1rem; color: var(--birkenstock-blue); margin: 12px 0; }
.cert-issued { font-size: 0.85rem; color: var(--birkenstock-gold); font-weight: 600; }
.cert-certify { font-size: 0.9rem; color: var(--birkenstock-gray); margin: 12px 0; }
.cert-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.btn-dl {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 13px 28px;
  font-family: var(--font-head);
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-dl:hover { background: var(--birkenstock-blue-dark); }
.btn-secondary {
  background: white;
  color: var(--birkenstock-blue);
  border: 1.5px solid var(--birkenstock-blue);
  border-radius: 10px;
  padding: 13px 28px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-secondary:hover { background: var(--birkenstock-blue); color: white; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--birkenstock-black);
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 0.85rem;
  opacity: 0;
  transition: all .4s;
  z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.loading { text-align: center; padding: 60px; color: var(--birkenstock-gray); }

@media (max-width: 768px) {
  .hero { padding: 32px 20px 40px; }
  .hero h1 { font-size: 1.5rem; }
  .main { padding: 24px 20px 60px; }
  .top-bar { padding: 12px 20px; }
}
</style>
</head>

<script>
  let modules = [];
  let perguntas = [];
  let completedModules = {};
  let answers = {};
  let quizPassed = false;
  let cursoId = null;
  let nomeUser = localStorage.getItem('usuarioAtivo') || 'Colaborador';
  let cursoData = { nome: '', duracao: '', descricao: '' };
  let prazoFormacao = '31/12/2026';
  
  // Configurar PDF.js worker
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  function toast(msg, isError = false) { 
    const t = document.getElementById('toast'); 
    t.textContent = msg; 
    t.style.background = isError ? '#dc2626' : '#1a1a1a';
    t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 3500); 
  }
  
  function showLoading(btnId, isLoading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    if (isLoading) {
      btn.classList.add('btn-loading');
      btn.disabled = true;
      const originalText = btn.innerHTML;
      btn.setAttribute('data-original-text', originalText);
      btn.innerHTML = '<span class="loading-spinner"></span> A processar...';
    } else {
      btn.classList.remove('btn-loading');
      btn.disabled = false;
      const originalText = btn.getAttribute('data-original-text');
      if (originalText) btn.innerHTML = originalText;
    }
  }
  
  function fmtDate(d) { 
    return d.toLocaleDateString('pt-PT', {day:'2-digit', month:'short', year:'numeric'}); 
  }

  // Extrair ID do Google Drive a partir da URL
  function extractGoogleDriveId(url) {
    const patterns = [
      /\/file\/d\/([^\/]+)/,
      /id=([^&]+)/,
      /\/d\/([^\/]+)/,
      /uc\?export=view&id=([^&]+)/
    ];
    for (const pattern of patterns) {
      const match = url.match(pattern);
      if (match) return match[1];
    }
    return null;
  }

  // Gerar embed URL para Google Drive
  function getGoogleDriveEmbedUrl(url) {
    const fileId = extractGoogleDriveId(url);
    if (fileId) {
      return `https://drive.google.com/file/d/${fileId}/preview`;
    }
    return null;
  }

  // Gerar embed URL para YouTube
  function getYoutubeEmbedUrl(url) {
    const patterns = [
      /youtube\.com\/watch\?v=([^&]+)/,
      /youtu\.be\/([^?]+)/,
      /youtube\.com\/embed\/([^?]+)/
    ];
    for (const pattern of patterns) {
      const match = url.match(pattern);
      if (match) return `https://www.youtube.com/embed/${match[1]}`;
    }
    return null;
  }

  // Verificar se URL é do YouTube
  function isYoutubeUrl(url) {
    return url.includes('youtube.com') || url.includes('youtu.be');
  }

  // Verificar se URL é do Google Drive
  function isGoogleDriveUrl(url) {
    return url.includes('drive.google.com');
  }

  // Verificar se URL é imagem
  function isImageUrl(url) {
    const imageExtensions = /\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/i;
    return imageExtensions.test(url);
  }

  // Verificar se URL é PowerPoint
  function isPowerPointUrl(url) {
    return url.includes('.pptx') || url.includes('.ppt') || url.includes('powerpoint');
  }

  // Verificar se URL é PDF
  function isPdfUrl(url) {
    return url.toLowerCase().endsWith('.pdf') || url.includes('.pdf?') || url.includes('/pdf/');
  }

  // Renderizar conteúdo baseado no tipo
  function renderContent(url, containerId, moduleId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    
    // Detectar tipo de conteúdo
    if (isYoutubeUrl(url)) {
      const embedUrl = getYoutubeEmbedUrl(url);
      container.innerHTML = `<div class="video-wrap"><iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div>`;
      setTimeout(() => markModuleAsViewed(moduleId), 1000);
    }
    else if (isGoogleDriveUrl(url)) {
      const embedUrl = getGoogleDriveEmbedUrl(url);
      if (embedUrl) {
        container.innerHTML = `<div class="doc-viewer"><div class="doc-viewer-header"><span>📄 Documento Google Drive</span></div><div class="doc-content"><iframe src="${embedUrl}" class="doc-iframe" allow="autoplay"></iframe></div></div>`;
      } else {
        container.innerHTML = `<div class="doc-viewer"><div class="doc-viewer-header"><span>📄 Documento</span></div><div class="doc-content"><iframe src="${url}" class="doc-iframe" allow="autoplay"></iframe></div></div>`;
      }
      setTimeout(() => markModuleAsViewed(moduleId), 1000);
    }
    else if (isImageUrl(url)) {
      container.innerHTML = `<div class="doc-viewer"><div class="doc-viewer-header"><span>🖼️ Imagem</span></div><div class="doc-content"><img src="${url}" class="doc-image" alt="Conteúdo da formação" onload="markModuleAsViewed('${moduleId}')" onerror="this.parentElement.innerHTML='<div class=\'doc-placeholder\'>⚠️ Imagem não disponível</div>'"></div></div>`;
    }
    else if (isPdfUrl(url)) {
      // Usar iframe para PDF
      container.innerHTML = `<div class="doc-viewer"><div class="doc-viewer-header"><span>📄 Documento PDF</span></div><div class="doc-content"><iframe src="${url}" class="doc-iframe" allow="autoplay"></iframe></div></div>`;
      setTimeout(() => markModuleAsViewed(moduleId), 1000);
    }
    else {
      // Fallback: iframe genérico
      container.innerHTML = `<div class="doc-viewer"><div class="doc-viewer-header"><span>📁 Conteúdo</span></div><div class="doc-content"><iframe src="${url}" class="doc-iframe" allow="autoplay"></iframe></div></div>`;
      setTimeout(() => markModuleAsViewed(moduleId), 1000);
    }
  }

  function markModuleAsViewed(moduleId) {
    const confirmBtn = document.getElementById(`btn-confirm-${moduleId}`);
    if (confirmBtn && confirmBtn.disabled) {
      confirmBtn.disabled = false;
    }
    const fillEl = document.getElementById(`fill-${moduleId}`);
    const pctEl = document.getElementById(`pct-${moduleId}`);
    if (fillEl && fillEl.style.width !== '100%') {
      fillEl.style.width = '100%';
      if (pctEl) pctEl.textContent = '100%';
      toast('✅ Conteúdo visualizado! Pode confirmar a conclusão.');
    }
  }

  // ==================== LER TOKEN DA URL ====================
  function lerTokenUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if(token && token !== 'null' && token !== 'undefined') {
      try {
        const tokenData = JSON.parse(atob(token));
        console.log("Token encontrado:", tokenData);
        
        if(tokenData.user) {
          localStorage.setItem('usuarioAtivo', tokenData.user);
          nomeUser = tokenData.user;
          document.getElementById('user-name-display').textContent = 'Olá, ' + nomeUser;
        }
        
        if(tokenData.prazo) {
          prazoFormacao = tokenData.prazo;
          document.getElementById('prazo-data').textContent = prazoFormacao;
        }
        
        if(tokenData.cursoId) {
          return tokenData.cursoId;
        }
      } catch(e) {
        console.error('Erro ao ler token:', e);
      }
    }
    
    // Prazo padrão se não vier do token
    document.getElementById('prazo-data').textContent = prazoFormacao;
    return localStorage.getItem('cursoAtualId');
  }

  // ==================== CARREGAR FORMAÇÃO ====================
  async function carregarFormacao(id) {
    const loadingDiv = document.getElementById('loading');
    const modulesContainer = document.getElementById('modules-container');
    
    loadingDiv.style.display = 'block';
    modulesContainer.style.display = 'none';
    
    if(!id) {
      loadingDiv.innerHTML = '❌ Nenhuma formação selecionada. <a href="dashboard.html" style="color: var(--birkenstock-blue);">Voltar ao dashboard</a>';
      return;
    }
    
    try {
      const docRef = window.doc(window.db, 'formacoes', id);
      const docSnap = await window.getDoc(docRef);
      
      if(docSnap.exists()) {
        const data = docSnap.data();
        cursoData.nome = data.nome || 'Formação';
        cursoData.duracao = data.duracao || '45 minutos';
        cursoData.descricao = data.descricao || '';
        modules = data.modulos || [];
        perguntas = data.perguntas || [];
        
        document.getElementById('user-name-display').textContent = 'Olá, ' + nomeUser;
        document.getElementById('hero-title').textContent = cursoData.nome;
        document.getElementById('hero-desc').textContent = cursoData.descricao;
        document.getElementById('meta-duration').textContent = cursoData.duracao;
        document.getElementById('meta-modules').textContent = modules.length + ' módulos';
        
        loadingDiv.style.display = 'none';
        modulesContainer.style.display = 'block';
        
        renderModules();
        updateProgress();
      } else {
        loadingDiv.innerHTML = '❌ Formação não encontrada. <a href="dashboard.html" style="color: var(--birkenstock-blue);">Voltar ao dashboard</a>';
      }
    } catch(error) {
      console.error('Erro ao carregar formação:', error);
      loadingDiv.innerHTML = '❌ Erro ao carregar formação: ' + error.message;
    }
  }

  function updateProgress() {
    const total = modules.length + 1;
    let done = modules.filter(m => completedModules[m.id]).length;
    if(quizPassed) done++;
    const pct = Math.round((done / total) * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '%';
    
    const dotsContainer = document.getElementById('steps-dots');
    dotsContainer.innerHTML = '';
    modules.forEach((m, idx) => {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      if(completedModules[m.id]) dot.classList.add('done');
      if(idx === modules.length - 1 && !quizPassed) dot.classList.add('active');
      dotsContainer.appendChild(dot);
    });
    
    if(quizPassed) {
      const lastDot = document.createElement('div');
      lastDot.className = 'step-dot done';
      dotsContainer.appendChild(lastDot);
    }
  }

  function renderModules() {
    const container = document.getElementById('modules-container');
    container.innerHTML = '';
    
    modules.forEach((module, idx) => {
      const block = document.createElement('div');
      block.className = 'section-block' + (completedModules[module.id] ? ' completed' : '');
      block.id = 'block-' + module.id;
      
      const header = document.createElement('div');
      header.className = 'section-header';
      header.onclick = () => toggleSection(module.id);
      header.innerHTML = `
        <div class="s-num">${idx + 1}</div>
        <div class="s-info">
          <div class="s-title">${module.titulo || 'Módulo ' + (idx + 1)}</div>
          <div class="s-meta">${module.tipo === 'video' ? '🎬 Vídeo' : module.tipo === 'text' ? '📄 Texto' : '📁 Conteúdo'}</div>
        </div>
        <div class="s-status">${completedModules[module.id] ? '✅' : '▶'}</div>
      `;
      block.appendChild(header);
      
      const body = document.createElement('div');
      body.className = 'section-body';
      body.id = 'body-' + module.id;
      
      let contentDiv = document.createElement('div');
      contentDiv.id = `content-${module.id}`;
      
      const conteudo = module.conteudo || {};
      const url = conteudo.url || '';
      
      if (module.tipo === 'video' && url) {
        contentDiv.innerHTML = `<div class="video-wrap" id="video-${module.id}"></div>`;
        body.appendChild(contentDiv);
        setTimeout(() => {
          const embedUrl = getYoutubeEmbedUrl(url);
          if (embedUrl) {
            document.getElementById(`video-${module.id}`).innerHTML = `<iframe src="${embedUrl}" frameborder="0" allowfullscreen style="width:100%; height:100%;"></iframe>`;
          } else {
            document.getElementById(`video-${module.id}`).innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen style="width:100%; height:100%;"></iframe>`;
          }
          markModuleAsViewed(module.id);
        }, 100);
      }
      else if (module.tipo === 'text' && conteudo.texto) {
        contentDiv.innerHTML = `<div class="text-content">${conteudo.texto}</div>`;
        body.appendChild(contentDiv);
        setTimeout(() => markModuleAsViewed(module.id), 500);
      }
      else if (url) {
        // Ficheiro ou URL
        contentDiv.innerHTML = `<div class="doc-viewer"><div class="doc-viewer-header"><span>📄 A carregar conteúdo...</span></div><div class="doc-content" id="doc-content-${module.id}"><div style="padding:40px; text-align:center;">⏳ A carregar...</div></div></div>`;
        body.appendChild(contentDiv);
        setTimeout(() => {
          renderContent(url, `doc-content-${module.id}`, module.id);
        }, 100);
      }
      else {
        contentDiv.innerHTML = `<div class="text-content"><p>Conteúdo não disponível.</p></div>`;
        body.appendChild(contentDiv);
        setTimeout(() => markModuleAsViewed(module.id), 500);
      }
      
      // Tracker de progresso
      const trackerDiv = document.createElement('div');
      trackerDiv.className = 'content-tracker';
      trackerDiv.innerHTML = `
        <span>📊 Progresso</span>
        <div style="flex:1"><div class="track-prog"><div class="track-fill" id="fill-${module.id}" style="width:0%"></div></div></div>
        <span id="pct-${module.id}" style="font-size:0.78rem;font-weight:600">0%</span>
      `;
      body.appendChild(trackerDiv);
      
      const confirmDiv = document.createElement('div');
      confirmDiv.className = 'confirm-viewed';
      confirmDiv.innerHTML = `
        <p><strong>Confirmar conclusão</strong><br>Confirme para desbloquear o próximo módulo.</p>
        <button class="btn-confirm" id="btn-confirm-${module.id}" disabled onclick="confirmModule('${module.id}')">✓ Confirmar e avançar</button>
      `;
      body.appendChild(confirmDiv);
      
      const confirmedDiv = document.createElement('div');
      confirmedDiv.className = 'confirmed-label';
      confirmedDiv.id = 'confirmed-' + module.id;
      confirmedDiv.style.display = 'none';
      confirmedDiv.innerHTML = '✅ Módulo concluído';
      body.appendChild(confirmedDiv);
      
      block.appendChild(body);
      container.appendChild(block);
    });
    
    renderQuiz();
  }
  
  async function confirmModule(moduleId) {
    const btn = document.getElementById(`btn-confirm-${moduleId}`);
    if (!btn || btn.disabled) return;
    
    showLoading(`btn-confirm-${moduleId}`, true);
    
    // Pequeno delay para feedback visual
    await new Promise(resolve => setTimeout(resolve, 500));
    
    completedModules[moduleId] = true;
    const block = document.getElementById('block-' + moduleId);
    if (block) block.classList.add('completed');
    
    const confirmBtn = document.getElementById(`btn-confirm-${moduleId}`);
    if (confirmBtn) confirmBtn.style.display = 'none';
    
    const confirmedDiv = document.getElementById(`confirmed-${moduleId}`);
    if (confirmedDiv) confirmedDiv.style.display = 'flex';
    
    toast('✅ Módulo concluído!');
    updateProgress();
    
    // Desbloquear próximo módulo
    const idx = modules.findIndex(m => m.id === moduleId);
    if (idx < modules.length - 1) {
      const nextBlock = document.getElementById('block-' + modules[idx + 1].id);
      if (nextBlock) {
        nextBlock.classList.remove('locked');
        // Rolar até o próximo módulo
        setTimeout(() => {
          nextBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
      }
      toast('📚 Próximo módulo desbloqueado!');
    } else {
      // Último módulo - desbloquear quiz
      const quizBlock = document.getElementById('block-quiz');
      if (quizBlock) {
        quizBlock.classList.remove('locked');
        const statusQuiz = document.getElementById('status-quiz');
        if (statusQuiz) statusQuiz.textContent = '📝';
        setTimeout(() => {
          quizBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
        toast('📝 Avaliação desbloqueada!');
      }
    }
    
    showLoading(`btn-confirm-${moduleId}`, false);
  }
  
  function renderQuiz() {
    const container = document.getElementById('modules-container');
    const quizBlock = document.createElement('div');
    quizBlock.className = 'section-block locked';
    quizBlock.id = 'block-quiz';
    quizBlock.innerHTML = `
      <div class="section-header" onclick="toggleSection('quiz')">
        <div class="s-num">📝</div>
        <div class="s-info">
          <div class="s-title">Avaliação Final</div>
          <div class="s-meta">Perguntas · Nota mínima: 70%</div>
        </div>
        <div class="s-status" id="status-quiz">🔒</div>
      </div>
      <div class="section-body" id="body-quiz">
        <div class="quiz-wrap" id="quiz-form">
          <div class="quiz-intro">
            <strong>📝 Avaliação de conhecimentos</strong>
            <p>Responde a todas as perguntas. Precisas de pelo menos 70% para ser aprovado.</p>
          </div>
          <div id="quiz-questions"></div>
          <div class="quiz-footer">
            <span id="quiz-answered">0 respondidas</span>
            <button class="btn-submit" id="btn-submit" disabled onclick="submitQuiz()">Submeter avaliação</button>
          </div>
        </div>
        <div class="result-screen" id="result-screen">
          <div class="result-score-ring" id="result-ring">
            <div class="score-num" id="score-num">0%</div>
          </div>
          <h2 id="result-title"></h2>
          <p id="result-msg"></p>
          <div class="result-actions">
            <button class="btn-dl" id="btn-see-cert" onclick="showCertificate()" style="display:none">🏅 Ver Certificado</button>
            <button class="btn-secondary" id="btn-retry" onclick="retryQuiz()" style="display:none">🔄 Tentar novamente</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(quizBlock);
    
    if(!perguntas.length) {
      perguntas = [
        { texto: "Qual é a melhor forma de aprender um novo conceito?", opcoes: ["Praticar diariamente", "Apenas ler", "Decorar", "Ignorar"], correta: "A" },
        { texto: "O que é importante para o desenvolvimento profissional?", opcoes: ["Formação contínua", "Estagnação", "Falta de interesse", "Desmotivação"], correta: "A" },
        { texto: "Como aplicar os conhecimentos adquiridos?", opcoes: ["Na prática diária", "Esquecer", "Guardar", "Não aplicar"], correta: "A" }
      ];
    }
    
    const questionsDiv = document.getElementById('quiz-questions');
    questionsDiv.innerHTML = perguntas.map((q, idx) => `
      <div class="question" id="q-${idx}">
        <div class="question-text">${q.texto}</div>
        <div class="options" id="opts-${idx}">
          ${q.opcoes.map((opt, optIdx) => `
            <div class="option-item" onclick="selectOpt(${idx}, ${optIdx})">
              <div class="option-letter">${String.fromCharCode(65+optIdx)}</div>
              ${opt}
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
    
    window.perguntas = perguntas;
    window.respostas = {};
    window.totalPerguntas = perguntas.length;
  }
  
  function selectOpt(qIdx, optIdx) {
    document.querySelectorAll(`#opts-${qIdx} .option-item`).forEach(el => el.classList.remove('selected'));
    document.querySelectorAll(`#opts-${qIdx} .option-item`)[optIdx].classList.add('selected');
    window.respostas[qIdx] = String.fromCharCode(65+optIdx);
    const answered = Object.keys(window.respostas).length;
    const answeredSpan = document.getElementById('quiz-answered');
    const submitBtn = document.getElementById('btn-submit');
    if (answeredSpan) answeredSpan.textContent = `${answered} de ${window.totalPerguntas} respondidas`;
    if (submitBtn) submitBtn.disabled = answered < window.totalPerguntas;
  }
  
  async function submitQuiz() {
    const submitBtn = document.getElementById('btn-submit');
    showLoading('btn-submit', true);
    
    await new Promise(resolve => setTimeout(resolve, 500));
    
    let score = 0;
    for(let i = 0; i < window.totalPerguntas; i++) {
      const isCorrect = window.respostas[i] === window.perguntas[i].correta;
      if(isCorrect) score++;
      document.querySelectorAll(`#opts-${i} .option-item`).forEach((el, idx) => {
        if(String.fromCharCode(65+idx) === window.perguntas[i].correta) el.classList.add('correct');
        else if(idx === window.respostas[i]?.charCodeAt(0)-65 && !isCorrect) el.classList.add('wrong');
        el.onclick = null;
      });
    }
    const pct = Math.round((score / window.totalPerguntas) * 100);
    const passed = pct >= 70;
    quizPassed = passed;
    document.getElementById('quiz-form').style.display = 'none';
    const rs = document.getElementById('result-screen');
    rs.style.display = 'block';
    document.getElementById('score-num').textContent = pct + '%';
    if(passed) {
      document.getElementById('result-title').textContent = '🎉 Parabéns, aprovado!';
      document.getElementById('result-msg').textContent = `Acertaste ${score} de ${window.totalPerguntas} perguntas (${pct}%). O teu certificado foi gerado.`;
      document.getElementById('btn-see-cert').style.display = 'inline-block';
      updateProgress();
      
      try {
        await window.addDoc(window.collection(window.db, 'historico'), {
          nome: nomeUser,
          curso: cursoData.nome,
          nota: pct + '%',
          data: fmtDate(new Date()),
          dataTimestamp: Date.now()
        });
        toast('✅ Resultado guardado!');
      } catch(e) { console.error('Erro ao guardar histórico:', e); }
    } else {
      document.getElementById('result-ring').classList.add('fail');
      document.getElementById('score-num').classList.add('fail');
      document.getElementById('result-title').textContent = 'Não aprovado';
      document.getElementById('result-msg').textContent = `Obtiveste ${pct}% (${score}/${window.totalPerguntas} corretas). Precisas de pelo menos 70%. Podes tentar novamente.`;
      document.getElementById('btn-retry').style.display = 'inline-block';
    }
    
    showLoading('btn-submit', false);
  }
  
  function retryQuiz() {
    window.respostas = {};
    for(let i = 0; i < window.totalPerguntas; i++) {
      document.querySelectorAll(`#opts-${i} .option-item`).forEach(el => {
        el.classList.remove('selected','correct','wrong');
        el.onclick = () => selectOpt(i, Array.from(el.parentNode.children).indexOf(el));
      });
    }
    document.getElementById('quiz-answered').textContent = `0 de ${window.totalPerguntas} respondidas`;
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-form').style.display = 'block';
    document.getElementById('result-ring').classList.remove('fail');
    document.getElementById('score-num').classList.remove('fail');
  }
  
  function showCertificate() {
    const now = new Date();
    const expiry = new Date(now); 
    expiry.setFullYear(expiry.getFullYear() + 1);
    const certId = 'CERT-' + new Date().getFullYear() + '-' + Math.floor(1000 + Math.random()*9000);
    const certHtml = `
      <div class="cert-screen" id="cert-screen" style="display:block">
        <div class="cert-card">
          <div class="cert-issued">Certificado Oficial · Birkenstock S&CC Portugal</div>
          <div class="cert-emblem">🎓</div>
          <div class="cert-certify">Certifica-se que</div>
          <div class="cert-name">${nomeUser}</div>
          <div class="cert-course-title">concluiu com sucesso a formação<br><strong>${cursoData.nome}</strong></div>
          <div class="cert-row">
            <div class="cert-col">
              <div class="cert-col-label">Nota final</div>
              <div class="cert-col-val">${document.getElementById('score-num').textContent}</div>
            </div>
            <div class="cert-col">
              <div class="cert-col-label">Data de emissão</div>
              <div class="cert-col-val">${fmtDate(now)}</div>
            </div>
            <div class="cert-col">
              <div class="cert-col-label">Validade</div>
              <div class="cert-col-val">${fmtDate(expiry)}</div>
            </div>
          </div>
          <div class="cert-id">ID: ${certId}</div>
        </div>
        <div class="cert-actions">
          <button class="btn-dl" onclick="toast('⬇️ Certificado descarregado!')">⬇️ Descarregar certificado PDF</button>
          <button class="btn-secondary" onclick="toast('📧 Certificado enviado para o teu e-mail!')">📧 Enviar para e-mail</button>
        </div>
      </div>
    `;
    document.getElementById('modules-container').insertAdjacentHTML('beforeend', certHtml);
    setTimeout(() => {
      const certScreen = document.getElementById('cert-screen');
      if(certScreen) certScreen.scrollIntoView({ behavior: 'smooth' });
    }, 200);
    toast('🏅 Certificado gerado!');
  }
  
  function toggleSection(id) {
    if(id === 'quiz') {
      const block = document.getElementById('block-quiz');
      if(block && block.classList.contains('locked')) return;
      const bodyQuiz = document.getElementById('body-quiz');
      if(bodyQuiz) bodyQuiz.classList.toggle('open');
    } else {
      const block = document.getElementById('block-' + id);
      if(block && block.classList.contains('locked')) return;
      const body = document.getElementById('body-' + id);
      if(body) body.classList.toggle('open');
    }
  }
  
  // ==================== INICIALIZAÇÃO ====================
  window.toggleSection = toggleSection;
  window.selectOpt = selectOpt;
  window.submitQuiz = submitQuiz;
  window.retryQuiz = retryQuiz;
  window.showCertificate = showCertificate;
  window.confirmModule = confirmModule;
  window.toast = toast;
  window.markModuleAsViewed = markModuleAsViewed;
  
  window.addEventListener('load', function() {
    const usuarioAtivo = localStorage.getItem('usuarioAtivo');
    if(!usuarioAtivo) {
      window.location.href = 'login.html';
      return;
    }
    nomeUser = usuarioAtivo;
    document.getElementById('user-name-display').textContent = 'Olá, ' + nomeUser;
    
    const cursoIdCarregado = lerTokenUrl();
    if(cursoIdCarregado) {
      carregarFormacao(cursoIdCarregado);
    } else {
      document.getElementById('loading').innerHTML = '❌ Nenhuma formação selecionada. <a href="dashboard.html" style="color: var(--birkenstock-blue);">Voltar ao dashboard</a>';
    }
  });
</script>
</body>
