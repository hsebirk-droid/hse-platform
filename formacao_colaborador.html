<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birkenstock S&CC — Formação</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --birkenstock-blue: #00338D;
  --birkenstock-blue-dark: #00277A;
  --birkenstock-gold: #C5A059;
  --birkenstock-gray: #616365;
  --birkenstock-beige: #F7F5F0;
  --white: #fff;
  --success: #10B981;
  --success-bg: #D1FAE5;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --danger: #EF4444;
  --danger-bg: #FEE2E2;
  --font-head: 'Fraunces', serif;
  --font-body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--birkenstock-beige); font-family: var(--font-body); }

.top-bar {
  background: var(--birkenstock-blue);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  border-bottom: 2px solid var(--birkenstock-gold);
}
.top-bar .logo {
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 700;
  color: white;
  line-height: 1.2;
}
.top-bar .logo span {
  font-size: 0.7rem;
  font-weight: 400;
  display: block;
  color: rgba(255,255,255,0.8);
}
.deadline-badge {
  background: rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 6px 16px;
  font-size: 0.8rem;
  color: white;
}
.user-name {
  background: rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 6px 16px;
  font-size: 0.8rem;
  color: white;
}
.btn-exit {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 6px 16px;
  border-radius: 30px;
  cursor: pointer;
}

/* Restante do CSS do formacao_colaborador.html igual ao seu atual */
/* ... (manter o resto do CSS) ... */
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">
    BIRKENSTOCK
    <span>S&CC Portugal · Formação</span>
  </div>
  <div class="user-name" id="user-name-display">Carregando...</div>
  <div class="deadline-badge">Prazo: <strong id="prazo-data">---</strong></div>
  <button class="btn-exit" onclick="sair()">Sair</button>
</div>

<!-- Restante do conteúdo do formacao_colaborador.html igual ao seu atual -->
<!-- ... (manter o resto do HTML e JavaScript) ... -->

</body>
</html>
