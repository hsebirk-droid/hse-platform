<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birkenstock S&CC — Formação</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --birkenstock-blue: #00338D;
  --birkenstock-blue-dark: #00277A;
  --birkenstock-gold: #C5A059;
  --birkenstock-gray: #616365;
  --birkenstock-beige: #F7F5F0;
  --birkenstock-white: #FFFFFF;
  --birkenstock-black: #1A1A1A;
  --birkenstock-border: #E2DDD6;
  --success: #10B981;
  --success-bg: #D1FAE5;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --danger: #EF4444;
  --danger-bg: #FEE2E2;
  --info: #3B82F6;
  --info-light: #DBEAFE;
  --font-head: 'Fraunces', serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--birkenstock-beige); font-family: var(--font-body); color: var(--birkenstock-black); min-height: 100vh; }

.top-bar {
  background: var(--birkenstock-blue);
  padding: 16px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  border-bottom: 2px solid var(--birkenstock-gold);
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-bar .logo {
  font-family: var(--font-head);
  font-size: 1.3rem;
  font-weight: 700;
  color: white;
}
.top-bar .logo span {
  font-size: 0.7rem;
  font-weight: 400;
  display: block;
  color: rgba(255,255,255,0.8);
}
.deadline-badge {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 30px;
  padding: 6px 18px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.9);
}
.deadline-badge strong { color: var(--birkenstock-gold); }
.user-name {
  background: rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 6px 18px;
  font-size: 0.8rem;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-exit {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 8px 20px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-exit:hover { background: rgba(255,255,255,0.3); }

.hero {
  background: linear-gradient(135deg, var(--birkenstock-blue) 0%, var(--birkenstock-blue-dark) 100%);
  padding: 56px 40px 64px;
  color: white;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: '🎓';
  position: absolute;
  right: 20px;
  bottom: 20px;
  font-size: 8rem;
  font-weight: 900;
  color: rgba(255,255,255,0.03);
  pointer-events: none;
}
.hero-inner { max-width: 900px; margin: 0 auto; }
.hero-tag {
  display: inline-block;
  background: rgba(197,160,89,0.2);
  border: 1px solid rgba(197,160,89,0.4);
  border-radius: 30px;
  padding: 5px 16px;
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  margin-bottom: 20px;
  color: var(--birkenstock-gold);
}
.hero h1 { 
  font-family: var(--font-head); 
  font-size: 2.4rem; 
  font-weight: 900; 
  line-height: 1.2; 
  margin-bottom: 16px; 
}
.hero p { 
  font-size: 1rem; 
  opacity: .85; 
  line-height: 1.6; 
  max-width: 600px; 
}
.hero-meta { 
  display: flex; 
  gap: 32px; 
  margin-top: 32px; 
  flex-wrap: wrap; 
}
.hero-meta-item { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  font-size: 0.85rem; 
  opacity: .85;
  background: rgba(255,255,255,0.1);
  padding: 6px 16px;
  border-radius: 30px;
}

.progress-strip {
  background: var(--birkenstock-white);
  border-bottom: 1px solid var(--birkenstock-border);
  padding: 20px 40px;
  position: sticky;
  top: 74px;
  z-index: 50;
}
.progress-strip-inner { max-width: 900px; margin: 0 auto; }
.progress-label { 
  display: flex; 
  justify-content: space-between; 
  font-size: 0.85rem; 
  color: var(--birkenstock-gray); 
  margin-bottom: 12px; 
}
.progress-label strong { color: var(--birkenstock-blue); }
.prog-track { 
  height: 10px; 
  background: #ede9e2; 
  border-radius: 8px; 
  overflow: hidden; 
}
.prog-fill { 
  height: 100%; 
  background: linear-gradient(90deg, var(--birkenstock-blue), var(--birkenstock-gold)); 
  border-radius: 8px; 
  transition: width .5s ease; 
}
.steps-dots { display: flex; gap: 12px; margin-top: 16px; }
.step-dot { flex: 1; height: 4px; border-radius: 4px; background: #ede9e2; }
.step-dot.done { background: var(--birkenstock-blue); }
.step-dot.active { background: var(--birkenstock-gold); }

.main { max-width: 900px; margin: 0 auto; padding: 40px 40px 80px; }

.section-block {
  background: var(--birkenstock-white);
  border-radius: var(--radius);
  border: 1px solid var(--birkenstock-border);
  margin-bottom: 28px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.section-block.locked { opacity: 0.6; pointer-events: none; }
.section-block.completed { border-left: 4px solid var(--birkenstock-gold); border-right: 4px solid var(--birkenstock-gold); }
.section-header {
  padding: 28px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  cursor: pointer;
}
.section-header:hover { background: #fafaf8; }
.s-num {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #f0ece5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 1.2rem;
  font-weight: 700;
  flex-shrink: 0;
}
.section-block.completed .s-num { background: var(--birkenstock-blue); color: white; }
.s-info { flex: 1; }
.s-title { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; color: var(--birkenstock-blue); margin-bottom: 8px; }
.s-meta { font-size: 0.85rem; color: var(--birkenstock-gray); display: flex; align-items: center; gap: 16px; }
.s-status { font-size: 1.4rem; }
.section-body { padding: 0 32px 32px; border-top: 1px solid var(--birkenstock-border); display: none; }
.section-body.open { display: block; }

.video-wrap {
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  aspect-ratio: 16/9;
  margin: 24px 0;
}
.video-wrap iframe { width: 100%; height: 100%; border: none; }
.doc-viewer {
  background: #fafaf8;
  border: 1px solid var(--birkenstock-border);
  border-radius: 16px;
  margin: 24px 0;
  overflow: hidden;
}
.doc-viewer-header {
  background: #f5f5f5;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--birkenstock-border);
}
.doc-content { min-height: 600px; max-height: 750px; overflow: auto; background: #f5f5f5; text-align: center; }
.doc-iframe { width: 100%; height: 650px; border: none; }
.text-content { 
  font-size: 1rem; 
  line-height: 1.8; 
  color: var(--birkenstock-gray); 
  margin: 24px 0;
  background: var(--birkenstock-white);
  padding: 32px;
  border-radius: 16px;
  border: 1px solid var(--birkenstock-border);
}
.content-tracker {
  background: var(--info-light);
  border: 1px solid #bbdefb;
  border-radius: 12px;
  padding: 16px 20px;
  margin: 24px 0;
  display: flex;
  align-items: center;
  gap: 16px;
}
.track-prog { flex: 1; height: 8px; background: #bbdefb; border-radius: 6px; overflow: hidden; }
.track-fill { height: 100%; background: linear-gradient(90deg, var(--birkenstock-blue), var(--birkenstock-gold)); border-radius: 6px; transition: width .5s ease; }
.confirm-viewed {
  background: var(--birkenstock-beige);
  border: 1px solid var(--birkenstock-border);
  border-radius: 16px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 24px 0 16px;
  flex-wrap: wrap;
  gap: 20px;
}
.btn-confirm {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  border-radius: 40px;
  padding: 14px 32px;
  font-family: var(--font-head);
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
}
.btn-confirm:hover:not(:disabled) { background: var(--birkenstock-blue-dark); }
.btn-confirm:disabled { background: var(--birkenstock-gray); cursor: not-allowed; }
.confirmed-label { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  color: var(--success); 
  background: var(--success-bg);
  padding: 10px 20px;
  border-radius: 40px;
}
.loading-spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: white;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.quiz-intro { 
  background: var(--warning-light); 
  border: 1px solid #fed7aa; 
  border-radius: 16px; 
  padding: 24px; 
  margin: 24px 0; 
}
.question { 
  margin-bottom: 36px; 
  background: var(--birkenstock-white);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid var(--birkenstock-border);
}
.question-text { 
  font-family: var(--font-head); 
  font-size: 1.05rem; 
  font-weight: 700; 
  margin-bottom: 20px; 
  color: var(--birkenstock-blue);
  padding-left: 16px;
  border-left: 4px solid var(--birkenstock-gold);
}
.options { display: flex; flex-direction: column; gap: 12px; }
.option-item {
  display: flex;
  align-items: center;
  gap: 16px;
  border: 2px solid var(--birkenstock-border);
  border-radius: 14px;
  padding: 14px 20px;
  cursor: pointer;
}
.option-item:hover { border-color: var(--birkenstock-gold); background: rgba(197,160,89,0.05); }
.option-item.selected { border-color: var(--birkenstock-blue); background: rgba(0,51,141,0.05); }
.option-item.correct { border-color: var(--success); background: var(--success-bg); }
.option-item.wrong { border-color: var(--danger); background: var(--danger-bg); }
.option-letter {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #f0ece5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 700;
  flex-shrink: 0;
}
.option-item.selected .option-letter { background: var(--birkenstock-blue); color: white; }
.quiz-footer { 
  margin-top: 36px; 
  border-top: 1px solid var(--birkenstock-border); 
  padding-top: 28px; 
  display: flex; 
  justify-content: space-between; 
  flex-wrap: wrap; 
  gap: 20px; 
}
.btn-submit {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  border-radius: 40px;
  padding: 14px 40px;
  font-weight: 700;
  cursor: pointer;
}
.btn-submit:disabled { background: #ccc; cursor: not-allowed; }
.result-screen { text-align: center; padding: 48px 32px; display: none; }
.result-score-ring {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 8px solid var(--birkenstock-blue);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  background: rgba(0,51,141,0.05);
}
.result-score-ring.fail { border-color: var(--warning); background: var(--warning-light); }
.score-num { font-family: var(--font-head); font-size: 2.8rem; font-weight: 900; color: var(--birkenstock-blue); }
.cert-screen { display: none; }
.cert-actions { display: flex; gap: 20px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.btn-dl {
  background: var(--birkenstock-blue);
  color: white;
  border: none;
  border-radius: 40px;
  padding: 12px 32px;
  cursor: pointer;
  font-weight: 600;
}
.btn-secondary {
  background: white;
  color: var(--birkenstock-blue);
  border: 2px solid var(--birkenstock-blue);
  border-radius: 40px;
  padding: 12px 32px;
  cursor: pointer;
  font-weight: 600;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--birkenstock-black);
  color: white;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 0.85rem;
  opacity: 0;
  transition: all .4s;
  z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.loading { text-align: center; padding: 80px; color: var(--birkenstock-gray); }

@media (max-width: 768px) {
  .hero { padding: 40px 24px 48px; }
  .hero h1 { font-size: 1.6rem; }
  .main { padding: 24px 20px 60px; }
  .top-bar { padding: 12px 20px; }
  .section-header { padding: 20px; }
  .s-num { width: 44px; height: 44px; font-size: 1rem; }
  .s-title { font-size: 1.1rem; }
  .section-body { padding: 0 20px 20px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">BIRKENSTOCK<span>S&CC PORTUGAL</span></div>
  <div class="user-name"><i class="fas fa-user-circle"></i> <span id="user-name-display">Carregando...</span></div>
  <div class="deadline-badge"><i class="fas fa-calendar-alt"></i> Prazo: <strong id="prazo-data">---</strong></div>
  <button class="btn-exit" onclick="sairDaFormacao()"><i class="fas fa-sign-out-alt"></i> Sair</button>
</div>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag"><i class="fas fa-graduation-cap"></i> Curso</div>
    <h1 id="hero-title">Carregando formação...</h1>
    <p id="hero-desc">A carregar conteúdo...</p>
    <div class="hero-meta">
      <div class="hero-meta-item"><i class="fas fa-clock"></i> <span id="meta-duration">--</span></div>
      <div class="hero-meta-item"><i class="fas fa-layer-group"></i> <span id="meta-modules">-- módulos</span></div>
      <div class="hero-meta-item"><i class="fas fa-question-circle"></i> Avaliação</div>
      <div class="hero-meta-item"><i class="fas fa-certificate"></i> Certificado</div>
    </div>
  </div>
</div>

<div class="progress-strip">
  <div class="progress-strip-inner">
    <div class="progress-label"><span><i class="fas fa-chart-line"></i> Progresso</span><strong id="progress-text">0%</strong></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="steps-dots" id="steps-dots"></div>
  </div>
</div>

<div class="main" id="main-content">
  <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> A carregar formação...</div>
  <div id="modules-container" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwywvboQgWqkrZlbwrUPdaUq-gLnWM64E",
    authDomain: "plataforma-ssa-3130e.firebaseapp.com",
    projectId: "plataforma-ssa-3130e",
    storageBucket: "plataforma-ssa-3130e.firebasestorage.app",
    messagingSenderId: "850671249674",
    appId: "1:850671249674:web:53a115408f8006745c32f3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.db = db;
</script>

<script>
  let modules = [], perguntas = [], completedModules = {}, answers = {}, quizPassed = false;
  let cursoId = null, nomeUser = localStorage.getItem('usuarioAtivo') || 'Colaborador';
  let cursoData = { nome: '', duracao: '', descricao: '' };
  let prazoFormacao = '31/12/2026';

  function toast(msg, type = 'info') { 
    const t = document.getElementById('toast'); 
    t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 4000); 
  }
  
  function fmtDate(d) { return d.toLocaleDateString('pt-PT', {day:'2-digit', month:'short', year:'numeric'}); }
  function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m; }); }

  function lerTokenUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if(token && token !== 'null') {
      try {
        const tokenData = JSON.parse(atob(token));
        if(tokenData.user) { localStorage.setItem('usuarioAtivo', tokenData.user); nomeUser = tokenData.user; }
        if(tokenData.prazo) { prazoFormacao = tokenData.prazo; document.getElementById('prazo-data').textContent = prazoFormacao; }
        if(tokenData.cursoId) return tokenData.cursoId;
      } catch(e) {}
    }
    document.getElementById('prazo-data').textContent = prazoFormacao;
    return localStorage.getItem('cursoAtualId');
  }

  async function carregarFormacao(id) {
    const loadingDiv = document.getElementById('loading');
    const modulesContainer = document.getElementById('modules-container');
    loadingDiv.style.display = 'block';
    modulesContainer.style.display = 'none';
    if(!id) { loadingDiv.innerHTML = '❌ Nenhuma formação selecionada.'; return; }
    try {
      const docSnap = await window.getDoc(window.doc(window.db, 'formacoes', id));
      if(docSnap.exists()) {
        const data = docSnap.data();
        cursoData = { nome: data.nome, duracao: data.duracao, descricao: data.descricao };
        modules = data.modulos || [];
        perguntas = data.perguntas || [];
        document.getElementById('user-name-display').innerHTML = `<i class="fas fa-user"></i> ${nomeUser}`;
        document.getElementById('hero-title').textContent = cursoData.nome;
        document.getElementById('hero-desc').textContent = cursoData.descricao;
        document.getElementById('meta-duration').textContent = cursoData.duracao;
        document.getElementById('meta-modules').textContent = modules.length + ' módulos';
        loadingDiv.style.display = 'none';
        modulesContainer.style.display = 'block';
        renderModules();
        updateProgress();
      } else { loadingDiv.innerHTML = '❌ Formação não encontrada.'; }
    } catch(error) { loadingDiv.innerHTML = '❌ Erro: ' + error.message; }
  }

  function updateProgress() {
    const total = modules.length + 1;
    let done = modules.filter(m => completedModules[m.id]).length + (quizPassed ? 1 : 0);
    const pct = Math.round((done / total) * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = pct + '%';
    const dotsContainer = document.getElementById('steps-dots');
    dotsContainer.innerHTML = '';
    modules.forEach((m, idx) => {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      if(completedModules[m.id]) dot.classList.add('done');
      dotsContainer.appendChild(dot);
    });
    if(quizPassed) { const dot = document.createElement('div'); dot.className = 'step-dot done'; dotsContainer.appendChild(dot); }
  }

  function renderModules() {
    const container = document.getElementById('modules-container');
    container.innerHTML = '';
    modules.forEach((module, idx) => {
      const block = document.createElement('div');
      block.className = 'section-block' + (completedModules[module.id] ? ' completed' : '');
      block.id = 'block-' + module.id;
      block.innerHTML = `
        <div class="section-header" onclick="toggleSection('${module.id}')">
          <div class="s-num">${idx + 1}</div>
          <div class="s-info"><div class="s-title">${escapeHtml(module.titulo)}</div><div class="s-meta">${module.tipo === 'video' ? '🎬 Vídeo' : module.tipo === 'text' ? '📄 Texto' : '📁 Conteúdo'}</div></div>
          <div class="s-status">${completedModules[module.id] ? '✅' : '▶'}</div>
        </div>
        <div class="section-body" id="body-${module.id}">
          <div id="content-${module.id}">Carregando conteúdo...</div>
          <div class="content-tracker"><span>📊 Progresso</span><div style="flex:1"><div class="track-prog"><div class="track-fill" id="fill-${module.id}" style="width:0%"></div></div></div><span id="pct-${module.id}">0%</span></div>
          <div class="confirm-viewed"><p><strong>Confirmar conclusão</strong><br>Confirme para avançar.</p><button class="btn-confirm" id="btn-confirm-${module.id}" disabled onclick="confirmModule('${module.id}')">✓ Confirmar</button></div>
          <div class="confirmed-label" id="confirmed-${module.id}" style="display:none">✅ Módulo concluído</div>
        </div>
      `;
      container.appendChild(block);
      setTimeout(() => {
        const url = module.conteudo?.url || '';
        const contentDiv = document.getElementById(`content-${module.id}`);
        if(module.tipo === 'text' && module.conteudo?.texto) contentDiv.innerHTML = `<div class="text-content">${module.conteudo.texto}</div>`;
        else if(url) contentDiv.innerHTML = `<div class="doc-viewer"><div class="doc-viewer-header"><i class="fas fa-file"></i> Conteúdo</div><div class="doc-content"><iframe src="${url}" class="doc-iframe"></iframe></div></div>`;
        else contentDiv.innerHTML = '<div class="text-content">Conteúdo não disponível.</div>';
        setTimeout(() => { document.getElementById(`btn-confirm-${module.id}`).disabled = false; document.getElementById(`fill-${module.id}`).style.width = '100%'; document.getElementById(`pct-${module.id}`).textContent = '100%'; }, 500);
      }, 100);
    });
    renderQuiz();
  }

  async function confirmModule(moduleId) {
    completedModules[moduleId] = true;
    document.getElementById(`block-${moduleId}`).classList.add('completed');
    document.getElementById(`btn-confirm-${moduleId}`).style.display = 'none';
    document.getElementById(`confirmed-${moduleId}`).style.display = 'flex';
    toast('✅ Módulo concluído!', 'success');
    updateProgress();
    const idx = modules.findIndex(m => m.id === moduleId);
    if(idx < modules.length - 1) document.getElementById(`block-${modules[idx+1].id}`).classList.remove('locked');
    else { document.getElementById('block-quiz').classList.remove('locked'); document.getElementById('status-quiz').innerHTML = '📝'; toast('📝 Avaliação desbloqueada!', 'info'); }
  }

  function renderQuiz() {
    const container = document.getElementById('modules-container');
    const quizBlock = document.createElement('div');
    quizBlock.className = 'section-block locked';
    quizBlock.id = 'block-quiz';
    quizBlock.innerHTML = `
      <div class="section-header" onclick="toggleSection('quiz')">
        <div class="s-num">📝</div><div class="s-info"><div class="s-title">Avaliação Final</div><div class="s-meta">Nota mínima: 70%</div></div>
        <div class="s-status" id="status-quiz">🔒</div>
      </div>
      <div class="section-body" id="body-quiz">
        <div id="quiz-questions"></div>
        <div class="quiz-footer"><span id="quiz-answered">0 respondidas</span><button class="btn-submit" id="btn-submit" disabled onclick="submitQuiz()">Submeter</button></div>
        <div class="result-screen" id="result-screen"><div class="result-score-ring" id="result-ring"><div class="score-num" id="score-num">0%</div></div><h2 id="result-title"></h2><p id="result-msg"></p><div class="result-actions"><button class="btn-dl" id="btn-see-cert" onclick="showCertificate()" style="display:none">🏅 Certificado</button><button class="btn-secondary" id="btn-retry" onclick="retryQuiz()" style="display:none">🔄 Tentar</button></div></div>
      </div>
    `;
    container.appendChild(quizBlock);
    if(!perguntas.length) perguntas = [{ texto: "O que é importante para o desenvolvimento profissional?", opcoes: ["Formação contínua", "Estagnação", "Falta de interesse", "Desmotivação"], correta: "A" }];
    document.getElementById('quiz-questions').innerHTML = perguntas.map((q, idx) => `<div class="question"><div class="question-text">${q.texto}</div><div class="options" id="opts-${idx}">${q.opcoes.map((opt, i) => `<div class="option-item" onclick="selectOpt(${idx}, ${i})"><div class="option-letter">${String.fromCharCode(65+i)}</div>${opt}</div>`).join('')}</div></div>`).join('');
    window.perguntas = perguntas; window.respostas = {}; window.totalPerguntas = perguntas.length;
  }

  function selectOpt(qIdx, optIdx) { document.querySelectorAll(`#opts-${qIdx} .option-item`).forEach(el => el.classList.remove('selected')); document.querySelectorAll(`#opts-${qIdx} .option-item`)[optIdx].classList.add('selected'); window.respostas[qIdx] = String.fromCharCode(65+optIdx); document.getElementById('quiz-answered').innerHTML = `${Object.keys(window.respostas).length} de ${window.totalPerguntas} respondidas`; document.getElementById('btn-submit').disabled = Object.keys(window.respostas).length < window.totalPerguntas; }

  async function submitQuiz() {
    let score = 0;
    for(let i = 0; i < window.totalPerguntas; i++) { if(window.respostas[i] === window.perguntas[i].correta) score++; }
    const pct = Math.round((score / window.totalPerguntas) * 100);
    const passed = pct >= 70;
    quizPassed = passed;
    document.getElementById('quiz-questions').style.display = 'none';
    document.getElementById('quiz-footer').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('score-num').textContent = pct + '%';
    if(passed) {
      document.getElementById('result-title').innerHTML = '🎉 Aprovado!';
      document.getElementById('result-msg').innerHTML = `Acertaste ${score}/${window.totalPerguntas} (${pct}%)`;
      document.getElementById('btn-see-cert').style.display = 'inline-block';
      updateProgress();
      localStorage.setItem('cursoConcluido', cursoId);
      await window.addDoc(window.collection(window.db, 'historico'), { nome: nomeUser, curso: cursoData.nome, nota: pct + '%', data: fmtDate(new Date()), dataTimestamp: Date.now() });
      toast('✅ Certificado gerado!', 'success');
    } else {
      document.getElementById('result-ring').classList.add('fail');
      document.getElementById('result-title').innerHTML = '❌ Não aprovado';
      document.getElementById('result-msg').innerHTML = `Obtiveste ${pct}%. Precisas de 70%.`;
      document.getElementById('btn-retry').style.display = 'inline-block';
    }
  }

  function retryQuiz() {
    window.respostas = {};
    document.getElementById('quiz-questions').style.display = 'block';
    document.getElementById('quiz-footer').style.display = 'flex';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('quiz-answered').innerHTML = `0 de ${window.totalPerguntas} respondidas`;
    document.getElementById('result-ring').classList.remove('fail');
    document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected', 'correct', 'wrong'));
  }

  function showCertificate() {
    const now = new Date();
    const certId = 'CERT-' + new Date().getFullYear() + '-' + Math.floor(1000 + Math.random() * 9000);
    const nota = document.getElementById('score-num').textContent;
    const imagemFundo = 'imagens/fundo_certificado.png';
    const certHtml = `
      <div class="cert-screen" id="cert-screen" style="display:block">
        <div class="cert-card" style="background-image: url('${imagemFundo}'); background-size: cover; background-position: center; background-repeat: no-repeat; min-height: 500px; position: relative; margin-top: 24px; border-radius: 16px; overflow: hidden;">
          <div style="position: relative; z-index: 2; height: 100%; min-height: 500px;">
            <div style="position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%;">
              <div style="font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; color: #00338D; margin-bottom: 20px;">${escapeHtml(nomeUser)}</div>
              <div style="font-size: 1rem; color: #616365; margin-bottom: 12px;">concluiu com sucesso a formação</div>
              <div style="font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 700; color: #C5A059;">${escapeHtml(cursoData.nome)}</div>
            </div>
            <div style="position: absolute; bottom: 12%; left: 12%; text-align: center;">
              <div style="font-size: 0.7rem; color: #616365; text-transform: uppercase;">NOTA FINAL</div>
              <div style="font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: #00338D;">${nota}</div>
            </div>
            <div style="position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); text-align: center;">
              <div style="font-size: 0.7rem; color: #616365; text-transform: uppercase;">DATA</div>
              <div style="font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; color: #00338D;">${fmtDate(now)}</div>
            </div>
            <div style="position: absolute; bottom: 12%; right: 12%; text-align: center;">
              <div style="font-size: 0.7rem; color: #616365; text-transform: uppercase;">CERTIFICADO ID</div>
              <div style="font-family: monospace; font-size: 0.8rem; font-weight: 600; color: #00338D;">${certId}</div>
            </div>
          </div>
        </div>
        <div class="cert-actions" style="margin-top: 20px;">
          <button class="btn-dl" onclick="window.print()"><i class="fas fa-print"></i> Imprimir</button>
          <button class="btn-secondary" onclick="voltarDashboard()"><i class="fas fa-home"></i> Voltar</button>
        </div>
      </div>
    `;
    const modulesContainer = document.getElementById('modules-container');
    const existing = document.getElementById('cert-screen');
    if(existing) existing.remove();
    modulesContainer.insertAdjacentHTML('beforeend', certHtml);
    setTimeout(() => document.getElementById('cert-screen')?.scrollIntoView({ behavior: 'smooth' }), 200);
  }

  function voltarDashboard() { window.location.href = 'dashboard.html'; }
  function sairDaFormacao() { if(confirm('Sair? O progresso será guardado.')) window.location.href = 'dashboard.html'; }
  function toggleSection(id) { if(id === 'quiz') { if(document.getElementById('block-quiz').classList.contains('locked')) { toast('Complete os módulos primeiro!', 'error'); return; } document.getElementById('body-quiz').classList.toggle('open'); } else { if(document.getElementById('block-' + id).classList.contains('locked')) { toast('Complete o módulo anterior!', 'error'); return; } document.getElementById('body-' + id).classList.toggle('open'); } }

  window.toggleSection = toggleSection; window.selectOpt = selectOpt; window.submitQuiz = submitQuiz; window.retryQuiz = retryQuiz; window.showCertificate = showCertificate; window.confirmModule = confirmModule; window.voltarDashboard = voltarDashboard; window.sairDaFormacao = sairDaFormacao;

  window.addEventListener('load', function() {
    if(!localStorage.getItem('usuarioAtivo')) { window.location.href = 'login.html'; return; }
    nomeUser = localStorage.getItem('usuarioAtivo');
    document.getElementById('user-name-display').innerHTML = `<i class="fas fa-user"></i> ${nomeUser}`;
    const cursoIdCarregado = lerTokenUrl();
    if(cursoIdCarregado) { cursoId = cursoIdCarregado; carregarFormacao(cursoIdCarregado); }
    else document.getElementById('loading').innerHTML = '❌ Nenhuma formação selecionada.';
  });
</script>
</body>
</html>
