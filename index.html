<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birkenstock S&CC Portugal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Estilos específicos da página de redirecionamento */
    .redirect-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--birkenstock-blue), var(--birkenstock-blue-dark));
    }
    
    .redirect-card {
      text-align: center;
      padding: 48px;
      background: var(--white);
      border-radius: 24px;
      box-shadow: var(--shadow-lg);
      max-width: 400px;
      margin: 20px;
    }
    
    .redirect-logo {
      font-size: 2rem;
      font-weight: 800;
      color: var(--birkenstock-blue);
      margin-bottom: 16px;
    }
    
    .redirect-logo small {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--birkenstock-gray);
      display: block;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--bg);
      border-top-color: var(--birkenstock-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 24px auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .redirect-text {
      color: var(--birkenstock-gray);
      margin-top: 16px;
    }
    
    .manual-link {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    
    .manual-link a {
      color: var(--birkenstock-blue);
      text-decoration: none;
    }
    
    .manual-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="redirect-container">
    <div class="redirect-card">
      <div class="redirect-logo">
        BIRKENSTOCK
        <small>S&CC Portugal</small>
      </div>
      <div class="spinner"></div>
      <div class="redirect-text">
        <p>A redirecionar para a plataforma de formação...</p>
      </div>
      <div class="manual-link">
        <p>Se não for redirecionado automaticamente:</p>
        <a href="login.html">Clique aqui para aceder à plataforma →</a>
      </div>
    </div>
  </div>

  <script>
    // Redirecionamento automático para o login
    setTimeout(function() {
      window.location.href = "login.html";
    }, 1500);
  </script>
</body>
</html>
